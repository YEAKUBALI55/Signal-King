<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending News</title>
    <style>
        body {
            background-color: #121b2d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .news-container {
            width: 100%;
            max-width: 450px;
            background: rgba(18, 27, 45, 0.95);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            border: 2px solid transparent;
            border-image: linear-gradient(to bottom right, #ff007f, #7f00ff, #00f2fe, #4facfe) 1;
            box-sizing: border-box;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3366;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .news-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 4px solid #00f2fe;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .news-card:last-child {
            margin-bottom: 0;
        }

        .news-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .news-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            color: #f1f5f9;
            margin: 0 0 6px 0;
        }

        .news-time {
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="news-container">
        <div class="header-title">
            <span class="live-dot"></span> World Trending News
        </div>
        
        <div id="news-list">
            <div class="loader">Fetching live trends...</div>
        </div>
    </div>

    <script>
        async function fetchTrendingNews() {
            const newsList = document.getElementById('news-list');
            const rssUrl = encodeURIComponent('https://feeds.bbci.co.uk/news/world/rss.xml');
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === 'ok' && data.items) {
                    newsList.innerHTML = ''; 
                    
                    const topFive = data.items.slice(0, 5);

                    topFive.forEach((item, index) => {
                        const pubDate = new Date(item.pubDate);
                        const formattedTime = pubDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        const cardHTML = `
                            <a href="${item.link}" target="_blank" class="news-card">
                                <h3 class="news-title">${item.title}</h3>
                                <div class="news-time">
                                    <span>🔥 Trend #${index + 1}</span>
                                    <span>${formattedTime}</span>
                                </div>
                            </a>
                        `;
                        newsList.innerHTML += cardHTML;
                    });
                } else {
                    newsList.innerHTML = '<div class="loader">Unable to load news. Retrying...</div>';
                }
            } catch (error) {
                console.error("Error fetching news:", error);
                newsList.innerHTML = '<div class="loader">Connection error. Please restart app.</div>';
            }
        }

        fetchTrendingNews();
        setInterval(fetchTrendingNews, 300000);
    </script>
</body>
</html>
