<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Crypto Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background: #0f172a;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 24px;
            width: 350px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { text-align: center; margin-bottom: 1.5rem; font-weight: 700; letter-spacing: 1px; }

        .coin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .coin:last-child { border-bottom: none; }

        .coin-name { font-weight: 600; }
        .price { font-family: monospace; color: #38bdf8; }
    </style>
</head>
<body>

<div class="container">
    <h2>MARKET LIVE</h2>
    <div id="crypto-list">
        <div class="coin"><span>Bitcoin (BTC)</span><span class="price" id="btc">--</span></div>
        <div class="coin"><span>Ethereum (ETH)</span><span class="price" id="eth">--</span></div>
        <div class="coin"><span>Tether (USDT)</span><span class="price" id="usdt">--</span></div>
        <div class="coin"><span>BNB (BNB)</span><span class="price" id="bnb">--</span></div>
        <div class="coin"><span>XRP (XRP)</span><span class="price" id="xrp">--</span></div>
    </div>
</div>

<script>
    async function fetchPrices() {
        const url = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin,ripple&vs_currencies=usd';
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            document.getElementById('btc').innerText = `$${data.bitcoin.usd.toLocaleString()}`;
            document.getElementById('eth').innerText = `$${data.ethereum.usd.toLocaleString()}`;
            document.getElementById('usdt').innerText = `$${data.tether.usd.toLocaleString()}`;
            document.getElementById('bnb').innerText = `$${data.binancecoin.usd.toLocaleString()}`;
            document.getElementById('xrp').innerText = `$${data.ripple.usd.toLocaleString()}`;
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }
    
    fetchPrices();
    setInterval(fetchPrices, 30000); // Updates every 30 seconds
</script>
</body>
</html>
