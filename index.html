<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Chart</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; overflow: hidden; }
    </style>
</head>
<body>

    <!-- TradingView Widget -->
    <div class="tradingview-widget-container" id="chart-container" style="width:100%;height:100%;">
        <div id="tradingview_chart" style="width:100%;height:100%;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "container_id": "tradingview_chart",
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "light",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#ffffff",
            "enable_publishing": false,
            "hide_top_toolbar": false, // এখানে toolbar অন করে দিলাম যাতে আপনি সব কয়েন ও টাইমফ্রেম পান
            "hide_legend": true,
            "save_image": false,
            "withdateranges": true,
            "studies": [] // ভলিউম ইন্ডিকেটর এখানে নেই, একদম ক্লিন
        });
    </script>
</body>
</html>
