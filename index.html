<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB Live News</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.news{
background:#111;
border-radius:15px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 0 10px rgba(255,255,255,.15);
}

.news img{
width:100%;
height:240px;
object-fit:cover;
}

.news h2{
padding:15px;
font-size:24px;
}

.news p{
padding:0 15px 20px;
color:#ccc;
font-size:17px;
line-height:1.6;
}
</style>

</head>

<body>

<div class="container" id="news"></div>

<script>

const news = [

{
title:"কলকাতায় প্রবল বৃষ্টির সম্ভাবনা",
image:"https://picsum.photos/900/500?1",
desc:"আবহাওয়া দপ্তরের পূর্বাভাস অনুযায়ী আগামী ২৪ ঘণ্টায় দক্ষিণবঙ্গের বিভিন্ন জেলায় ভারী বৃষ্টির সম্ভাবনা রয়েছে।"
},

{
title:"হাওড়ায় নতুন উন্নয়ন প্রকল্প",
image:"https://picsum.photos/900/500?2",
desc:"রাজ্য সরকারের নতুন প্রকল্পে হাওড়া জেলায় একাধিক উন্নয়নমূলক কাজ শুরু হয়েছে।"
},

{
title:"উত্তরবঙ্গে পর্যটকদের ভিড়",
image:"https://picsum.photos/900/500?3",
desc:"দার্জিলিং ও ডুয়ার্সে পর্যটকদের সংখ্যা বেড়েছে।"
}

];

const box=document.getElementById("news");

news.forEach(n=>{

box.innerHTML+=`

<div class="news">

<img src="${n.image}">

<h2>${n.title}</h2>

<p>${n.desc}</p>

</div>

`;

});

</script>

</body>
</html>
