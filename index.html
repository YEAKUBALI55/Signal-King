<!DOCTYPE html>
<html>
<body>

    <h2>Local Media Preview</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    
    <div id="displayArea" style="margin-top: 20px;"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const displayArea = document.getElementById('displayArea');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    if (file.type.startsWith('image/')) {
                        displayArea.innerHTML = `<img src="${e.target.result}" style="max-width: 300px;">`;
                    } else if (file.type.startsWith('video/')) {
                        displayArea.innerHTML = `<video src="${e.target.result}" controls style="max-width: 300px;"></video>`;
                    }
                };
                
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
