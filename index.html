<div class="card" onclick="alert('বিস্তারিত খবর শীঘ্রই যুক্ত করা হবে')">
    <h2>🏛️ সরকারি সংবাদ</h2>
    <div id="news" style="color: #555; margin-top: 10px;">
        <!-- এখানে খবর লোড হবে -->
        খবর লোড হচ্ছে...
    </div>
</div>

<script>
    async function fetchNews() {
        const newsContainer = document.getElementById('news');
        const API_KEY = 'YOUR_API_KEY'; // এখানে আপনার সঠিক API Key দিন
        const url = `https://newsapi.org/v2/top-headlines?country=in&category=general&apiKey=${API_KEY}`;

        try {
            let response = await fetch(url);
            let data = await response.json();
            
            if (data.articles && data.articles.length > 0) {
                newsContainer.innerText = data.articles[0].title;
            } else {
                newsContainer.innerText = "বর্তমানে কোনো নতুন সরকারি সংবাদ পাওয়া যায়নি।";
            }
        } catch (error) {
            console.error("Error:", error);
            // API কাজ না করলে বা নেটওয়ার্ক সমস্যা থাকলে এই টেক্সট দেখাবে
            newsContainer.innerText = "সরকারি সংবাদ পোর্টালটি আপডেট করা হচ্ছে। অনুগ্রহ করে কিছুক্ষণ পর আবার চেষ্টা করুন।";
        }
    }

    // ফাংশনটি কল করুন
    fetchNews();
</script>
