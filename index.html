<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeakub Binance Momentum Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #111827 100%); 
            color: #ffffff; 
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }

        .gradient-border-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #00c853, #00e5ff, #a78bfa, #ff3d00);
            padding: 3px; 
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 200, 83, 0.2);
            display: flex;
        }

        .container {
            width: 100%;
            height: 100%;
            background: #0f172a; 
            border-radius: 21px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 12px;
        }

        .status-msg {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            padding: 10px;
            font-weight: 600;
        }

        .coin-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 0 20px;
            height: 16%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .coin-icon {
            font-size: 26px;
            color: #00e5ff;
        }

        .coin-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .coin-pair {
            font-size: 12px;
            color: #64748b;
            display: block;
            margin-top: 2px;
        }

        .price-section {
            text-align: right;
        }

        .price {
            font-size: 22px;
            font-weight: 800;
            transition: color 0.2s ease;
        }

        .price-up { color: #00c853; text-shadow: 0 0 10px rgba(0, 200, 83, 0.3); }
        .price-down { color: #ff3d00; text-shadow: 0 0 10px rgba(255, 61, 0, 0.3); }
    </style>
</head>
<body>

    <div class="gradient-border-box">
        <div class="container" id="dashboard-container">
            <div class="status-msg" id="status-text">Checking Saved Setup...</div>
        </div>
    </div>

    <script>
        // Binance high volume market coins list
        const targetCoins = [
            'BTC','ETH','BNB','SOL','XRP','ADA','DOT','DOGE','SHIB','AVAX','LINK','LTC','MATIC','UNI','BCH',
            'FIL','XLM','ATOM','ETC','HBAR','ICP','GRT','AAVE','NEAR','ALGO','QNT','FLOW','EGLD','SAND','MANA',
            'THETA','EOS','AXS','XTZ','FTM','APE','GALA','MKR','CRV','OP','LDO','APT','ARB','INJ','TIA','SUI'
        ];

        const MAX_COINS = 5;
        let lastPrices = {};
        let sockets = []; // Store multiple live socket references

        function getTodayDateString() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        // 1. Strict Candle Condition Checker
        async function checkMomentumSetup(coin) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=1d&limit=3`);
                const data = await response.json();

                if (data && data.length >= 2) {
                    const yOpen = parseFloat(data[data.length - 2][1]);
                    const yClose = parseFloat(data[data.length - 2][4]);

                    const tOpen = parseFloat(data[data.length - 1][1]);
                    const tClose = parseFloat(data[data.length - 1][4]);

                    const isYesterdayGreen = yClose > yOpen;
                    const isTodayGreen = tClose > tOpen;

                    const yesterdayBodyHeight = yClose - yOpen;
                    const yesterdayFiftyPercentLevel = yOpen + (yesterdayBodyHeight * 0.5);
                    const isAboveFiftyPercent = tClose >= yesterdayFiftyPercentLevel;

                    if (isYesterdayGreen && isTodayGreen && isAboveFiftyPercent) {
                        return true; 
                    }
                }
            } catch (error) {
                console.error(`Scanner error for ${coin}:`, error);
            }
            return false;
        }

        // 2. Inject Coin Card & Instantly Initialize Dedicated Live Streaming Stream
        function createCoinCard(coin) {
            const container = document.getElementById('dashboard-container');

            if(document.getElementById(`card-${coin}`)) return;

            const card = document.createElement('div');
            card.className = 'coin-card';
            card.id = `card-${coin}`;
            card.innerHTML = `
                <div class="coin-info">
                    <i class="fas fa-bolt coin-icon"></i>
                    <div>
                        <span class="coin-name">${coin}</span>
                        <span class="coin-pair">${coin} / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-${coin}">Connecting...</div>
                </div>
            `;
            container.appendChild(card);

            // Connect dedicated individual stream for this specific card to prevent congestion bugs
            connectIndividualStream(coin);
        }

        // 3. Robust Individual Stream Connector Engine
        function connectIndividualStream(coin) {
            const coinLower = coin.toLowerCase();
            const wsUrl = `wss://stream.binance.com:9443/ws/${coinLower}usdt@ticker`;
            const ws = new WebSocket(wsUrl);
            sockets.push(ws);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                const currentPrice = parseFloat(msg.c); 
                const priceEl = document.getElementById(`price-${coin}`);

                if (priceEl) {
                    // Dynamically set decimal places based on price size
                    let decimalPlaces = currentPrice < 1 ? 4 : (currentPrice < 10 ? 3 : 2);
                    let formattedPrice = currentPrice.toLocaleString(undefined, { 
                        minimumFractionDigits: decimalPlaces,
                        maximumFractionDigits: decimalPlaces 
                    });

                    priceEl.innerText = `$${formattedPrice}`;

                    // Dynamic price direction color flash system
                    if (lastPrices[coin]) {
                        if (currentPrice > lastPrices[coin]) {
                            priceEl.className = 'price price-up';
                        } else if (currentPrice < lastPrices[coin]) {
                            priceEl.className = 'price price-down';
                        }
                    }

                    setTimeout(() => { priceEl.className = 'price'; }, 800);
                    lastPrices[coin] = currentPrice;
                }
            };

            // Individual auto reconnect fallbacks
            ws.onclose = () => {
                setTimeout(() => { connectIndividualStream(coin); }, 3000);
            };
            ws.onerror = () => {
                ws.close();
            };
        }

        // Master Controller Routine
        async function initScanner() {
            const savedDate = localStorage.getItem('scan_date');
            const currentDate = getTodayDateString();
            let savedCoins = JSON.parse(localStorage.getItem('matched_coins')) || [];

            if (savedDate !== currentDate) {
                localStorage.removeItem('matched_coins');
                localStorage.setItem('scan_date', currentDate);
                savedCoins = [];
            }

            if (savedCoins.length > 0) {
                document.getElementById('status-text').style.display = 'none';
                savedCoins.forEach(coin => {
                    createCoinCard(coin);
                });
            } else {
                document.getElementById('status-text').innerText = "New Date. Scanning setups (Max 5)...";
                let matchedCount = 0;
                let temporaryMatches = [];

                for(let coin of targetCoins) {
                    if (matchedCount >= MAX_COINS) break; 

                    let isMatch = await checkMomentumSetup(coin);
                    if(isMatch) {
                        createCoinCard(coin);
                        temporaryMatches.push(coin);
                        matchedCount++;
                    }
                    await new Promise(resolve => setTimeout(resolve, 60)); 
                }

                if(temporaryMatches.length > 0) {
                    document.getElementById('status-text').style.display = 'none';
                } else {
                    document.getElementById('status-text').innerText = "0 coins found matching setup today.";
                }

                localStorage.setItem('matched_coins', JSON.stringify(temporaryMatches));
            }
        }

        initScanner();
    </script>
</body>
</html>
