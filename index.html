<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Chart</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; overflow: hidden; }
        #chart { width: 100%; height: 100vh; }
        .ui-top { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 10px; }
        select { background: #f0f0f0; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ui-top">
        <select id="pair" onchange="updateChart()">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="SOLUSDT">SOL/USDT</option>
        </select>
        <select id="timeframe" onchange="updateChart()">
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="30m">30m</option>
            <option value="1h">1H</option>
            <option value="4h">4H</option>
            <option value="1w">1W</option>
            <option value="1M">1M</option>
        </select>
    </div>
    <div id="chart"></div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#ffffff' }, textColor: '#333' },
            grid: { vertLines: { color: '#eee' }, horzLines: { color: '#eee' } },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350',
            borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });

        function updateChart() {
            const pair = document.getElementById('pair').value;
            const tf = document.getElementById('timeframe').value;
            // এখানে আপনি আপনার API বা ডাটা সোর্স লিংক করতে পারেন
            console.log("Fetching: " + pair + " at " + tf);
        }
    </script>
</body>
</html>
