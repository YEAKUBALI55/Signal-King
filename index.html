<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মুর্শিদাবাদ ডেইলি নিউজ</title>

<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: 'Arial', sans-serif;
        overflow-y: auto; /* স্ক্রল করার জন্য */
    }

    .news-card {
        width: 100vw;
        min-height: 100vh;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-bottom: 2px solid #333;
    }

    h2 { font-size: 32px; margin-bottom: 20px; color: #ffcc00; }
    p { font-size: 22px; line-height: 1.8; color: #eee; margin-bottom: 30px; }

    .news-footer {
        font-size: 16px;
        color: #888;
        border-top: 1px solid #333;
        padding-top: 15px;
    }
</style>
</head>

<body>

<div id="news-container"></div>

<script>
    // প্রতিদিনের খবর এখানে আপডেট করুন
    const newsData = [
        { title: "মুর্শিদাবাদে নতুন প্রশাসনিক ভবন", desc: "মুর্শিদাবাদ জেলায় সাধারণ মানুষের কাজের সুবিধার জন্য আজ নতুন প্রশাসনিক ভবনের উদ্বোধন করা হলো।" },
        { title: "লালগোলায় সেচ ব্যবস্থার উন্নতি", desc: "লালগোলা ব্লকের বিস্তীর্ণ এলাকায় কৃষি জমিকে জলসেচের আওতায় আনতে নতুন খাল খননের কাজ শুরু হয়েছে।" },
        { title: "বহরমপুর বইমেলা শুরু", desc: "বহরমপুর ব্যারাক স্কোয়ার মাঠে আজ থেকে শুরু হয়েছে জেলা বইমেলা, চলবে আগামী এক সপ্তাহ।" },
        { title: "মুর্শিদাবাদ স্টেশনে নতুন ট্রেন স্টপেজ", desc: "যাত্রীদের চাহিদার কথা মাথায় রেখে আজ থেকে মুর্শিদাবাদ স্টেশনে নতুন দুটি লোকাল ট্রেনের স্টপেজ ঘোষণা করা হয়েছে।" }
    ];

    const container = document.getElementById("news-container");
    const today = new Date().toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });

    newsData.forEach(item => {
        container.innerHTML += `
            <div class="news-card">
                <h2>${item.title}</h2>
                <p>${item.desc}</p>
                <div class="news-footer">
                    সূত্র: মুর্শিদাবাদ ডেইলি নিউজ | তারিখ: ${today}
                </div>
            </div>
        `;
    });

    // ৩০ সেকেন্ড পর পর পেজ রিফ্রেশ (নতুন খবরের জন্য)
    setInterval(() => {
        location.reload();
    }, 30000);
</script>

</body>
</html>
