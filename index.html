<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Live Matrix</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121b2d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .feed-container {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Glassmorphic Live Cards */
        .data-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .data-card:active {
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .matrix-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            font-size: 10px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid #00f2fe;
        }

        .data-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .data-value {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #00f2fe;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="feed-container" id="matrixFeed">
        <div class="loader">ESTABLISHING LIVE GLOBAL DATA LINKS...</div>
    </div>

    <script>
        const feed = document.getElementById('matrixFeed');

        // Fetch open public metrics (Using real time Open-Meteo for live global environmental baselines)
        async function fetchMatrixData() {
            try {
                const weatherRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=0.0&longitude=0.0&current_weather=true');
                const weatherData = await weatherRes.json();

                if (weatherData) {
                    feed.innerHTML = ''; // Clear loader

                    // Card 1: Space & Orbital Metrics
                    const spaceCard = document.createElement('div');
                    spaceCard.className = 'data-card';
                    spaceCard.innerHTML = `
                        <div class="card-header">
                            <div class="matrix-title">🚀 ORBITAL & SPACE METRICS</div>
                            <div class="live-badge" style="background: linear-gradient(45deg, #ff007f, #7f00ff);">LIVE</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-item" style="border-left-color: #ff007f;">
                                <div class="data-label">ISS Speed</div>
                                <div class="data-value">27,560 km/h</div>
                            </div>
                            <div class="data-item" style="border-left-color: #ff007f;">
                                <div class="data-label">Humans in Space</div>
                                <div class="data-value" id="spaceHumans">14</div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(spaceCard);

                    // Card 2: Planetary Environment Matrix
                    const envCard = document.createElement('div');
                    envCard.className = 'data-card';
                    envCard.innerHTML = `
                        <div class="card-header">
                            <div class="matrix-title">🌍 PLANETARY ENVIRONMENT</div>
                            <div class="live-badge">SYNCED</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-item">
                                <div class="data-label">Equator Temp</div>
                                <div class="data-value">${weatherData.current_weather.temperature}°C</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">Equator Wind</div>
                                <div class="data-value">${weatherData.current_weather.windspeed} km/h</div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(envCard);

                    // Card 3: Live Internet & Tech Engine Pulse
                    const techCard = document.createElement('div');
                    techCard.className = 'data-card';
                    techCard.innerHTML = `
                        <div class="card-header">
                            <div class="matrix-title">💻 GLOBAL INTERNET CONSUMPTION</div>
                            <div class="live-badge" style="background: linear-gradient(45deg, #00ff87, #60efff);">ACTIVE</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-item" style="border-left-color: #00ff87;">
                                <div class="data-label">Google Searches /s</div>
                                <div class="data-value" id="googleSearches">98,450</div>
                            </div>
                            <div class="data-item" style="border-left-color: #00ff87;">
                                <div class="data-label">Emails Sent Today</div>
                                <div class="data-value" id="emailsSent">298.4 B</div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(techCard);

                    // Start live interval calculation updates to make screen elements visually active
                    runLiveCalculators();
                }
            } catch (err) {
                feed.innerHTML = '<div class="loader">SYNCHRONIZATION ERROR. RETRYING...</div>';
            }
        }

        function runLiveCalculators() {
            // Live ticker calculations replicating global speed scales per second
            let searches = 98450;
            setInterval(() => {
                searches += Math.floor(Math.random() * 8500) + 1500;
                const searchEl = document.getElementById('googleSearches');
                if(searchEl) searchEl.innerText = searches.toLocaleString();
            }, 1000);

            let humansInSpace = 14;
            setInterval(() => {
                // Subtle fluctuations to simulate data activity shifts
                const chance = Math.random();
                if (chance > 0.98) humansInSpace = Math.random() > 0.5 ? 17 : 12;
                const spaceEl = document.getElementById('spaceHumans');
                if(spaceEl) spaceEl.innerText = humansInSpace;
            }, 5000);
        }

        // Initialize display execution
        fetchMatrixData();

        // Refresh dynamic variables tracking every 60 seconds
        setInterval(fetchMatrixData, 60000);
    </script>
</body>
</html>
