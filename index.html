<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murshidabad Live Updates</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background: #0a0a0a; color: #fff; padding: 20px; }
    .news-container { max-width: 600px; margin: auto; }
    .news-card { 
        background: #1a1a1a; 
        padding: 20px; 
        border-radius: 15px; 
        margin-bottom: 20px; 
        border-left: 5px solid #4ecca3;
    }
    h2 { font-size: 18px; margin-bottom: 10px; color: #4ecca3; }
    p { font-size: 15px; color: #ccc; margin-bottom: 15px; line-height: 1.5; }
    .btn-source { 
        display: inline-block; 
        padding: 8px 15px; 
        background: #4ecca3; 
        color: #000; 
        text-decoration: none; 
        border-radius: 5px; 
        font-weight: bold; 
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="news-container" id="news-box"></div>

<script>
    // এইখানে আপনার নিউজগুলো আপডেট করবেন।
    // লিংকগুলো এমন জায়গায় দেবেন যেটা ক্লিক করলে সরাসরি সেই নিউজ পেজ বা নোটিশ পেজে নিয়ে যায়।
    const newsData = [
        { 
            title: "মুর্শিদাবাদে আজকের নতুন আপডেট", 
            desc: "আজকের খবরের বিস্তারিত জানতে সোর্স বাটনে ক্লিক করুন।", 
            link: "https://murshidabad.nic.in/notice/" 
        }
    ];

    const box = document.getElementById("news-box");

    newsData.forEach(item => {
        box.innerHTML += `
            <div class="news-card">
                <h2>${item.title}</h2>
                <p>${item.desc}</p>
                <a href="${item.link}" target="_blank" class="btn-source">বিস্তারিত দেখুন (Source)</a>
            </div>
        `;
    });
</script>

</body>
</html>
