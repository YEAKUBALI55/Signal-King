    <div id="dynamic-cards-container" aria-live="polite"></div>
</div>

<div class="bottom-nav" aria-hidden="false">
    <div class="nav-item-center">
        <i class="fas fa-chart-bar"></i>
        <span>Signals Scanner</span>
    </div>
</div>

<div id="toast" role="status" aria-live="polite">Value copied!</div>

<script>
    // Identify as Telegram WebApp safely
    const tg = (typeof window.Telegram === 'object' && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    try{ tg?.expand?.(); tg?.ready?.(); }catch(e){ /* ignore */ }

    // -- Local state and persistence with safe parsing
    const STORAGE_KEYS = { ACTIVE: 'activeCoins', DATA: 'coinData' };
    let activeCoins = new Set();
    let coinData = {};

    (function loadFromStorage(){
        try {
            const a = JSON.parse(localStorage.getItem(STORAGE_KEYS.ACTIVE) || '[]');
            const d = JSON.parse(localStorage.getItem(STORAGE_KEYS.DATA) || '{}');
            if(Array.isArray(a)) activeCoins = new Set(a);
            if(typeof d === 'object' && d !== null) coinData = d;
        } catch (err) {
            console.warn('Could not parse saved state, clearing storage keys.', err);
            localStorage.removeItem(STORAGE_KEYS.ACTIVE);
            localStorage.removeItem(STORAGE_KEYS.DATA);
            activeCoins = new Set();
            coinData = {};
        }
    })();

    function saveStateToStorage(){
        try {
            localStorage.setItem(STORAGE_KEYS.ACTIVE, JSON.stringify(Array.from(activeCoins)));
            localStorage.setItem(STORAGE_KEYS.DATA, JSON.stringify(coinData));
        } catch (err) {
            console.warn('Failed to save to localStorage', err);
        }
    }

    const maxSlots = 3;
    const container = document.getElementById('dynamic-cards-container');
    const toast = document.getElementById('toast');

    // Number formatting helper
    function formatNumber(value, decimals){
        try {
            return new Intl.NumberFormat(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals}).format(value);
        } catch(e){
            return Number(value).toFixed(decimals);
        }
    }

    // Audio context reuse (created on first user gesture)
    let audioCtx = null;
    function ensureAudioContext(){
        if(audioCtx) return audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
            audioCtx = null;
        }
        return audioCtx;
    }
    // Try to resume on user interaction
    function resumeAudioOnUserGesture(){
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    }
    ['click','touchstart','keydown'].forEach(ev => window.addEventListener(ev, resumeAudioOnUserGesture, {once:true}));

    function playAlertSound(type){
        const ctx = ensureAudioContext();
        if(!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.value = 0.0;

        if(type === 'target'){
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(660, ctx.currentTime);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.28);
        } else if(type === 'entry'){
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.18);
        } else if(type === 'error'){
            osc.type = 'square';
            osc.frequency.setValueAtTime(220, ctx.currentTime);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.22);
        }
    }

    // Haptic helper
    function doHaptic(type){
        try {
            if(tg && tg.HapticFeedback) {
                if(type === 'heavy') tg.HapticFeedback.impact('heavy');
                else if(type === 'success') tg.HapticFeedback.notificationOccurred('success');
                else if(type === 'error') tg.HapticFeedback.notificationOccurred('error');
                else if(type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
            }
        } catch(e){ /* ignore */ }
    }

    // UI header
    function updateSlotUIHeader(){
        const el = document.getElementById('active-slot-counter');
        if(el) el.innerText = `Slots: ${activeCoins.size} / ${maxSlots}`;
    }

    // Throttle updates per coin to avoid DOM thrash (ms)
    const UPDATE_THROTTLE_MS = 300;

    // Inject card markup (no inline onclicks). Uses data attributes for copy.
    function injectCardMarkup(coin){
        const c = coinData[coin];
        if(!c) return;
        const isLong = c.direction === 'LONG';
        // helper for % calc
        const calcPct = (targetVal) => {
            const pct = ((targetVal - c.entryVal) / c.entryVal) * 100;
            return (c.direction === 'SHORT' ? -pct : pct);
        };

        const safeId = coin.replace(/[^a-zA-Z0-9_-]/g, '_'); // safe id part
        const cardId = `card-${safeId}`;

        if(document.getElementById(cardId)) return; // already injected

        const html = `
            <div class="signal-card" id="${cardId}" data-coin="${coin}" role="group" aria-label="${coin} trade card">
                <div class="card-header">
                    <div class="coin-title">${coin}/USDT <span class="strategy-badge ${isLong ? 'strong-buy' : 'strong-sell'}" id="signal-badge-${safeId}">${c.lastSignal}</span></div>
                    <div class="alert-status-badge" id="alert-badge-${safeId}">AWAITING ENTRY</div>
                </div>

                <div class="price-container">
                    <div class="price-label">Live Price Tracking</div>
                    <div class="live-price" id="price-${safeId}">$${formatNumber(c.lastEntryBasePrice || c.entryVal, c.decimals)}</div>
                    <div class="price-change" id="change-${safeId}">${(c.lastPercent||0)>=0?'+':''}${(c.lastPercent||0).toFixed(2)}%</div>
                </div>

                <div class="levels-grid">
                    <div class="level-box box-entry" role="button" tabindex="0" aria-label="Copy optimum entry" data-copy-value="${formatNumber(c.entryVal, c.decimals)}" data-target="entry-${safeId}">
                        <span class="level-title">Optimum Entry</span>
                        <span class="level-value" id="entry-${safeId}">${formatNumber(c.entryVal, c.decimals)}</span>
                    </div>

                    <div class="level-box box-target" role="button" tabindex="0" aria-label="Copy target 1" data-copy-value="${formatNumber(c.t1Val, c.decimals)}" data-target="target1-${safeId}">
                        <span class="level-title">T1 <span class="percent-badge" id="p-t1-${safeId}">${calcPct(c.t1Val).toFixed(2)}%</span></span>
                        <span class="level-value" id="target1-${safeId}">${formatNumber(c.t1Val, c.decimals)}</span>
                    </div>

                    <div class="level-box box-target" role="button" tabindex="0" aria-label="Copy target 2" data-copy-value="${formatNumber(c.t2Val, c.decimals)}" data-target="target2-${safeId}" style="background-color:#0288d1">
                        <span class="level-title">T2 <span class="percent-badge" id="p-t2-${safeId}">${calcPct(c.t2Val).toFixed(2)}%</span></span>
                        <span class="level-value" id="target2-${safeId}">${formatNumber(c.t2Val, c.decimals)}</span>
                    </div>

                    <div class="level-box box-stop" role="button" tabindex="0" aria-label="Copy stop loss" data-copy-value="${formatNumber(c.slVal, c.decimals)}" data-target="stop-${safeId}">
                        <span class="level-title">SL <span class="percent-badge" id="p-sl-${safeId}">${calcPct(c.slVal).toFixed(2)}%</span></span>
                        <span class="level-value" id="stop-${safeId}">${formatNumber(c.slVal, c.decimals)}</span>
                    </div>

                    <div class="level-box box-algo" style="background: #0f1724">
                        <span class="level-title">Engine Slot</span>
                        <span class="level-value" style="color:var(--accent)">ACTIVE</span>
                    </div>

                    <div class="level-box box-algo" style="background:#475569">
                        <span class="level-title">Status</span>
                        <span class="level-value" id="status-text-${safeId}">${c.currentTrackState === 'active_in_trade' ? 'LOCKED 🔒' : 'Ready'}</span>
                    </div>

                    <div class="box-info-bar" id="info-${safeId}"><i class="fas fa-bullseye" style="color:#ffb300"></i> Entry levels deployed. Monitoring market tap...</div>
                </div>
            </div>
        `;

        container.insertAdjacentHTML('beforeend', html);

        // If recovered state was active_in_trade, update classes/visuals
        if(c.currentTrackState === 'active_in_trade'){
            const cardEl = document.getElementById(cardId);
            if(cardEl) {
                cardEl.classList.add('card-entry-triggered');
                document.getElementById(`alert-badge-${safeId}`).innerText = 'ENTRY HIT';
                document.getElementById(`alert-badge-${safeId}`).classList.add('badge-entry-hit');
                const entryBox = cardEl.querySelector('.box-entry');
                if(entryBox) entryBox.classList.add('level-hit-highlight');
                const statusEl = document.getElementById(`status-text-${safeId}`);
                if(statusEl) statusEl.innerText = 'LOCKED 🔒';
            }
        }
    }

    // Event delegation for copy clicks/keyboard
    container.addEventListener('click', (e) => {
        const box = e.target.closest('.level-box');
        if(!box) return;
        const copyVal = box.getAttribute('data-copy-value');
        if(copyVal){
            navigator.clipboard.writeText(copyVal).then(()=> {
                showToast(`Copied: ${copyVal}`);
                doHaptic('heavy');
            }).catch(()=> showToast('Copy failed'));
        }
    });
    container.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' ') {
            const box = e.target.closest('.level-box');
            if(box && box.getAttribute('data-copy-value')){
                e.preventDefault();
                box.click();
            }
        }
    });

    // Toast helper
    let toastTimer = null;
    function showToast(msg){
        toast.innerText = msg;
        toast.style.opacity = '1';
        if(toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(()=> toast.style.opacity = '0', 1800);
    }

    // Binance stream + state machine
    function processGlobalStream(coin, currentPrice, openPrice){
        const percentChange = ((currentPrice - openPrice)/openPrice)*100;
        // update last percent for formatting in UI
        if(coinData[coin]) coinData[coin].lastPercent = percentChange;
        // if active, run engine else maybe open slot
        if(activeCoins.has(coin)){
            runQuantumEngine(coin, currentPrice, percentChange);
        } else {
            if(activeCoins.size < maxSlots && Math.abs(percentChange) > 2.5){
                initializeNewTradeSlot(coin, currentPrice, percentChange);
            }
        }
    }

    function initializeNewTradeSlot(coin, price, percentChange){
        if(activeCoins.has(coin)) return;
        activeCoins.add(coin);

        const isLong = percentChange > 0;
        const decimals = price < 0.01 ? 6 : (price < 1 ? 4 : 2);
        const direction = isLong ? 'LONG' : 'SHORT';
        coinData[coin] = {
            decimals,
            currentTrackState: 'monitoring_entry',
            direction,
            lastSignal: isLong ? 'STRONG BUY' : 'STRONG SELL',
            lastEntryBasePrice: price,
            entryVal: isLong ? price * 0.9985 : price * 1.0015,
            t1Val: isLong ? price * 1.0060 : price * 0.9940,
            t2Val: isLong ? price * 1.0140 : price * 0.9860,
            slVal: isLong ? price * 0.9920 : price * 1.0080,
            lastUpdate: 0
        };
        saveStateToStorage();
        updateSlotUIHeader();
        injectCardMarkup(coin);
    }

    // Update logic throttled per coin
    function runQuantumEngine(coin, price, percentChange){
        const config = coinData[coin];
        if(!config) return;
        const now = Date.now();
        if(config.lastUpdate && (now - config.lastUpdate) < UPDATE_THROTTLE_MS) {
            // update stored price and percent but skip DOM update
            config._pendingPrice = price;
            config._pendingPercent = percentChange;
            return;
        }
        config.lastUpdate = now;
        // apply pending queued value next when needed
        const safeId = coin.replace(/[^a-zA-Z0-9_-]/g, '_');

        // update DOM
        const priceEl = document.getElementById(`price-${safeId}`);
        const changeEl = document.getElementById(`change-${safeId}`);
        if(priceEl) priceEl.innerText = '$' + formatNumber(price, config.decimals);
        if(changeEl){
            changeEl.innerText = `${percentChange>=0?'+':''}${percentChange.toFixed(2)}%`;
            changeEl.className = `price-change ${percentChange>=0 ? 'change-up' : 'change-down'}`;
        }

        // state transitions
        if(config.currentTrackState === 'active_in_trade'){
            monitorActiveTradeState(coin, price);
            return;
        }
        if(config.currentTrackState === 'monitoring_entry'){
            const isHit = config.direction === 'LONG' ? (price <= config.entryVal) : (price >= config.entryVal);
            if(isHit){
                config.currentTrackState = 'active_in_trade';
                saveStateToStorage();

                const cardEl = document.getElementById(`card-${safeId}`);
                const badgeEl = document.getElementById(`alert-badge-${safeId}`);
                const statusEl = document.getElementById(`status-text-${safeId}`);
                const entryBox = document.getElementById(`entry-${safeId}`)?.closest('.level-box') || document.querySelector(`#card-${safeId} .box-entry`);

                cardEl?.classList.add('card-entry-triggered');
                if(badgeEl){ badgeEl.innerText = 'ENTRY HIT'; badgeEl.classList.add('badge-entry-hit'); }
                if(statusEl) statusEl.innerText = 'LOCKED 🔒';
                if(entryBox) entryBox.classList.add('level-hit-highlight');

                playAlertSound('entry');
                doHaptic('warning');
            }
        }
    }

    function monitorActiveTradeState(coin, price){
        const config = coinData[coin];
        if(!config) return;
        const safeId = coin.replace(/[^a-zA-Z0-9_-]/g, '_');

        const infoEl = document.getElementById(`info-${safeId}`);
        if(infoEl) infoEl.innerHTML = `<i class="fas fa-lock" style="color:${'#ff3d00'}"></i> Allocation Locked. Trailing limits tracking active...`;

        const isTargetHit = config.direction === 'LONG' ? (price >= config.t1Val) : (price <= config.t1Val);
        const isSLHit = config.direction === 'LONG' ? (price <= config.slVal) : (price >= config.slVal);

        if(isTargetHit || isSLHit){
            config.currentTrackState = 'terminated';
            saveStateToStorage();
            const card = document.getElementById(`card-${safeId}`);
            const badge = document.getElementById(`alert-badge-${safeId}`);
            const statusText = document.getElementById(`status-text-${safeId}`);
            const highlightBox = document.getElementById(isTargetHit ? `target1-${safeId}` : `stop-${safeId}`)?.closest('.level-box');

            if(card) {
                card.classList.remove('card-entry-triggered');
                card.classList.add(isTargetHit ? 'card-target-hit' : 'card-sl-hit');
            }
            if(badge) {
                badge.innerText = isTargetHit ? 'TARGET HIT 🎉' : 'SL HIT ❌';
                badge.classList.add(isTargetHit ? 'badge-target-hit' : 'badge-sl-hit');
            }
            if(statusText) statusText.innerText = 'Ready';
            if(highlightBox) highlightBox.classList.add('level-hit-highlight');

            playAlertSound(isTargetHit ? 'target' : 'error');
            doHaptic(isTargetHit ? 'success' : 'error');

            // remove after delay and free slot
            setTimeout(()=> {
                if(card) {
                    card.style.transition = 'opacity .5s ease, transform .4s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(8px)';
                    setTimeout(()=> {
                        card.remove();
                        activeCoins.delete(coin);
                        delete coinData[coin];
                        saveStateToStorage();
                        updateSlotUIHeader();
                    }, 500);
                }
            }, 3000);
        }
    }

    // Restore saved cards at startup
    function loadSavedStateOnRefresh(){
        updateSlotUIHeader();
        for(const coin of Array.from(activeCoins)){
            if(coinData[coin]){
                injectCardMarkup(coin);
            } else {
                // clean up stray active coin if no data
                activeCoins.delete(coin);
                saveStateToStorage();
                updateSlotUIHeader();
            }
        }
    }
    loadSavedStateOnRefresh();

    // WebSocket with reconnect/backoff
    let ws = null;
    let reconnectDelay = 1000; // start
    const MAX_RECONNECT = 60000;
    function connectWS(){
        try {
            ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
        } catch(err){
            console.error('WebSocket creation failed', err);
            scheduleReconnect();
            return;
        }

        ws.onopen = () => {
            console.info('Binance WS connected');
            reconnectDelay = 1000;
        };

        ws.onmessage = (evt) => {
            try {
                const data = JSON.parse(evt.data);
                if(!Array.isArray(data)) return;
                for(const ticker of data){
                    // Symbol sanity check
                    if(!ticker.s || !ticker.c || !ticker.o) continue;
                    if(ticker.s.endsWith('USDT') && !ticker.s.includes('UP') && !ticker.s.includes('DOWN')){
                        const coin = ticker.s.replace('USDT','');
                        const current = parseFloat(ticker.c);
                        const open = parseFloat(ticker.o);
                        if(Number.isFinite(current) && Number.isFinite(open)) processGlobalStream(coin, current, open);
                    }
                }
            } catch(err){
                console.warn('Failed to parse WS message', err);
            }
        };

        ws.onerror = (err) => {
            console.warn('WS error', err);
            // allow close/reconnect logic to handle
        };

        ws.onclose = (ev) => {
            console.info('WS closed', ev);
            scheduleReconnect();
        };
    }

    function scheduleReconnect(){
        if(ws && ws.readyState === WebSocket.OPEN) return;
        setTimeout(()=> {
            reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT);
            connectWS();
        }, reconnectDelay);
    }

    connectWS();

    // Defensive cleanup on page unload
    window.addEventListener('beforeunload', () => {
        try{ ws?.close(); }catch{}
    });
</script>
