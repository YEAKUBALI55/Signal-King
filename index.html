<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart India Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a73e8; font-size: 1.2rem; }
        .data { font-size: 24px; font-weight: bold; color: #333; }
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #fafafa; }
        input { width: 75%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ১. জনসংখ্যা -->
    <div class="card">
        <h2>🇮🇳 ভারতের জনসংখ্যা (Live)</h2>
        <div id="pop" class="data">Loading...</div>
    </div>

    <!-- ২. সরকারি সংবাদ -->
    <div class="card">
        <h2>🏛️ সরকারি সংবাদ (PIB)</h2>
        <div id="news">খবর লোড হচ্ছে...</div>
    </div>

    <!-- ৩. AI চ্যাটবট -->
    <div class="card">
        <h2>🤖 AI অ্যাসিস্ট্যান্ট</h2>
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="আপনার প্রশ্ন লিখুন...">
        <button onclick="sendMessage()">পাঠান</button>
    </div>

    <script>
        // জনসংখ্যা কাউন্টার
        let pop = 1476625576;
        setInterval(() => { pop += 1; document.getElementById('pop').innerText = pop.toLocaleString(); }, 3000);

        // সরকারি সংবাদ
        fetch('https://api.rss2json.com/v1/api.json?rss_url=https://pib.gov.in/RSSFeed.aspx')
        .then(res => res.json())
        .then(data => {
            document.getElementById('news').innerHTML = data.items.slice(0,3).map(item => `<p><a href="${item.link}" target="_blank">${item.title}</a></p>`).join('');
        });

        // AI চ্যাটবট
        async function sendMessage() {
            const input = document.getElementById('user-input').value;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<p><b>আপনি:</b> ${input}</p>`;
            
            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_GEMINI_API_KEY', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
            });
            const data = await response.json();
            chatBox.innerHTML += `<p style="color:#1a73e8;"><b>AI:</b> ${data.candidates[0].content.parts[0].text}</p>`;
            document.getElementById('user-input').value = '';
        }
    </script>
</body>
</html>
