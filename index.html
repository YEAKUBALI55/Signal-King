<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Price Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #111827 100%); 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00c853, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }

        /* Gradient Glowing Border wrapper for the home dashboard */
        .gradient-border-box {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(45deg, #00c853, #00e5ff, #a78bfa, #ff3d00);
            padding: 3px; /* Controls border thickness */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.15);
        }

        .container {
            width: 100%;
            background: #0f172a; /* Solid background inside the container */
            border-radius: 17px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .coin-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-icon {
            font-size: 24px;
            color: #f59e0b;
        }

        .coin-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .coin-pair {
            font-size: 12px;
            color: #64748b;
            display: block;
            margin-top: 2px;
        }

        .price-section {
            text-align: right;
        }

        .price {
            font-size: 20px;
            font-weight: 800;
            transition: color 0.2s ease;
        }

        /* Price change flash animation classes */
        .price-up { color: #00c853; text-shadow: 0 0 10px rgba(0, 200, 83, 0.3); }
        .price-down { color: #ff3d00; text-shadow: 0 0 10px rgba(255, 61, 0, 0.3); }
    </style>
</head>
<body>

    <h1><i class="fas fa-chart-line"></i> YEAKUB - BINANCE</h1>
    <p class="subtitle">ইয়াকুবের জন্য বেস্ট কয়েন</p>

    <!-- Glowing Colorful Wrapper Box Around The Dashboard -->
    <div class="gradient-border-box">
        <div class="container">
            <!-- Bitcoin -->
            <div class="coin-card" id="card-BTC">
                <div class="coin-info">
                    <i class="fab fa-bitcoin coin-icon"></i>
                    <div>
                        <span class="coin-name">Bitcoin</span>
                        <span class="coin-pair">BTC / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-BTC">Loading...</div>
                </div>
            </div>

            <!-- Ethereum -->
            <div class="coin-card" id="card-ETH">
                <div class="coin-info">
                    <i class="fab fa-ethereum coin-icon" style="color: #a78bfa;"></i>
                    <div>
                        <span class="coin-name">Ethereum</span>
                        <span class="coin-pair">ETH / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-ETH">Loading...</div>
                </div>
            </div>

            <!-- Binance Coin -->
            <div class="coin-card" id="card-BNB">
                <div class="coin-info">
                    <i class="fas fa-coins coin-icon" style="color: #facc15;"></i>
                    <div>
                        <span class="coin-name">BNB</span>
                        <span class="coin-pair">BNB / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-BNB">Loading...</div>
                </div>
            </div>

            <!-- Solana -->
            <div class="coin-card" id="card-SOL">
                <div class="coin-info">
                    <i class="fas fa-bolt coin-icon" style="color: #2dd4bf;"></i>
                    <div>
                        <span class="coin-name">Solana</span>
                        <span class="coin-pair">SOL / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-SOL">Loading...</div>
                </div>
            </div>

            <!-- Ripple -->
            <div class="coin-card" id="card-XRP">
                <div class="coin-info">
                    <i class="fas fa-circle-nodes coin-icon" style="color: #38bdf8;"></i>
                    <div>
                        <span class="coin-name">Ripple</span>
                        <span class="coin-pair">XRP / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-XRP">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Target coins configuration
        const coins = ['btc', 'eth', 'bnb', 'sol', 'xrp'];
        
        // Generate connection stream link
        const streams = coins.map(coin => `${coin}usdt@ticker`).join('/');
        const wsUrl = `wss://stream.binance.com:9443/stream?streams=${streams}`;
        
        const ws = new WebSocket(wsUrl);
        let lastPrices = {};

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const streamName = msg.stream;
            const data = msg.data;

            // Extract uppercase token symbol
            const coinSymbol = streamName.split('usdt')[0].toUpperCase();
            const currentPrice = parseFloat(data.c); 
            
            const priceEl = document.getElementById(`price-${coinSymbol}`);
            
            if (priceEl) {
                // Formatting decimals dynamically based on value scale
                let formattedPrice = currentPrice.toLocaleString(undefined, { 
                    minimumFractionDigits: currentPrice < 2 ? 4 : 2,
                    maximumFractionDigits: currentPrice < 2 ? 4 : 2 
                });
                
                priceEl.innerText = `$${formattedPrice}`;

                // Contrast comparison logic for color flash indicators
                if (lastPrices[coinSymbol]) {
                    if (currentPrice > lastPrices[coinSymbol]) {
                        priceEl.className = 'price price-up';
                    } else if (currentPrice < lastPrices[coinSymbol]) {
                        priceEl.className = 'price price-down';
                    }
                }

                // Smoothly reset style class after update interval
                setTimeout(() => {
                    priceEl.className = 'price';
                }, 800);

                // Commit to memory reference
                lastPrices[coinSymbol] = currentPrice;
            }
        };

        ws.onerror = (error) => {
            console.error("WebSocket Error: ", error);
        };

        ws.onclose = () => {
            console.log("Stream Disconnected. Reconnecting...");
            setTimeout(() => { location.reload(); }, 5000);
        };
    </script>
</body>
</html>
