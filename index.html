<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Live Data Stream</title>
    <style>
        /* Smooth Scrolling & Premium UI Setup */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121b2d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .feed-container {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Glassmorphism Data Cards */
        .data-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .data-card:active {
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .market-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            font-size: 10px;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid #00f2fe;
        }

        .data-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .up-trend {
            color: #10b981 !important;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #00f2fe;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="feed-container" id="dataFeed">
        <div class="loader">CONNECTING TO GLOBAL LIVE DATA STREAM...</div>
    </div>

    <script>
        const feed = document.getElementById('dataFeed');

        // Free real-time API for Crypto & Currency Global Rates
        const cryptoApi = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin&vs_currencies=usd&include_24hr_change=true';

        async function fetchGlobalData() {
            try {
                const response = await fetch(cryptoApi);
                const data = await response.json();
                
                if (data) {
                    feed.innerHTML = ''; // Clear loader

                    // Card 1: Crypto Market Data
                    const cryptoCard = document.createElement('div');
                    cryptoCard.className = 'data-card';
                    cryptoCard.innerHTML = `
                        <div class="card-header">
                            <div class="market-title">🪙 CRYPTO LIVE STREAM</div>
                            <div class="live-badge">REALTIME</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-item">
                                <div class="data-label">Bitcoin (BTC)</div>
                                <div class="data-value">$${data.bitcoin.usd.toLocaleString()}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">Ethereum (ETH)</div>
                                <div class="data-value">$${data.ethereum.usd.toLocaleString()}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">Solana (SOL)</div>
                                <div class="data-value">$${data.solana.usd.toLocaleString()}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">BNB</div>
                                <div class="data-value">$${data.binancecoin.usd.toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(cryptoCard);

                    // Card 2: Global Statistics Data (Simulation based on static global growth algorithms)
                    const statsCard = document.createElement('div');
                    statsCard.className = 'data-card';
                    statsCard.innerHTML = `
                        <div class="card-header">
                            <div class="market-title">📊 GLOBAL POPULATION CLOCK</div>
                            <div class="live-badge" style="background: linear-gradient(45deg, #00f2fe, #4facfe);">LIVE</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-item" style="border-left-color: #ff007f;">
                                <div class="data-label">World Population</div>
                                <div class="data-value" id="worldPop">8,214,567,120</div>
                            </div>
                            <div class="data-item" style="border-left-color: #ff007f;">
                                <div class="data-label">Internet Users</div>
                                <div class="data-value">5.54 Billion</div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(statsCard);

                    // Dynamic counter logic to make scrolling look extremely alive and functional
                    animatePopulation();
                }
            } catch (err) {
                feed.innerHTML = '<div class="loader">NETWORK ERROR. RETRYING...</div>';
            }
        }

        function animatePopulation() {
            const popEl = document.getElementById('worldPop');
            if(popEl) {
                let currentPop = 8214567120;
                setInterval(() => {
                    currentPop += Math.floor(Math.random() * 3) + 1;
                    popEl.innerText = currentPop.toLocaleString();
                }, 1000);
            }
        }

        // Initialize Feed load
        fetchGlobalData();
        
        // Auto pull fresh API numbers every 60 seconds smoothly
        setInterval(fetchGlobalData, 60000);
    </script>
</body>
</html>
