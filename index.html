<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live GPS Tracker</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }
        .location-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #00f2fe;
            padding: 15px;
            border-radius: 15px;
            font-family: sans-serif;
            text-align: center;
            border: 2px solid #ff007f;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="location-info" id="locationName">Loading Location...</div>

    <!-- Google Maps Script -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"></script>

    <script>
        let map, marker, geocoder;

        function initMap() {
            geocoder = new google.maps.Geocoder();
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 18,
                center: { lat: 0, lng: 0 },
                disableDefaultUI: true
            });

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    const pos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };

                    // ম্যাপ মুভ করা
                    map.setCenter(pos);
                    if (!marker) {
                        marker = new google.maps.Marker({ position: pos, map: map, title: "You" });
                    } else {
                        marker.setPosition(pos);
                    }

                    // জায়গার নাম বের করা
                    geocoder.geocode({ 'location': pos }, (results, status) => {
                        if (status === 'OK' && results[0]) {
                            document.getElementById('locationName').innerText = "Current Place: " + results[0].formatted_address;
                        }
                    });

                }, () => alert("GPS Permission Denied"), { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
