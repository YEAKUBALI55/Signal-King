<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeakub Pro Trader</title>
    <style>
        body { background: #0f172a; color: #ffffff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .coin-card { background: rgba(255, 255, 255, 0.05); border: 1px solid #334155; border-radius: 16px; padding: 15px; margin-bottom: 10px; }
        .price { font-size: 24px; font-weight: 800; }
        .levels { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; font-weight: bold; }
        .tp { color: #00c853; }
        .sl { color: #ff3d00; }
        .meta { font-size: 10px; color: #64748b; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="container" id="dashboard-container">
        <h2 style="text-align: center; margin-bottom: 20px;">Pro Momentum Scanner</h2>
    </div>

    <script>
        const targetCoins = ['BTC','ETH','BNB','SOL','XRP','ADA','AVAX','MATIC','LINK','DOT'];
        const leverage = 5;

        async function checkMomentumSetup(coin) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=1d&limit=2`);
                const data = await res.json();
                const yOpen = parseFloat(data[0][1]), yClose = parseFloat(data[0][4]);
                const tOpen = parseFloat(data[1][1]), tClose = parseFloat(data[1][4]);
                return (yClose > yOpen && tClose > tOpen && tClose >= (yOpen + (yClose - yOpen) * 0.5));
            } catch { return false; }
        }

        async function initScanner() {
            for(let coin of targetCoins) {
                if(await checkMomentumSetup(coin)) {
                    document.getElementById('dashboard-container').innerHTML += `
                        <div class="coin-card" id="card-${coin}">
                            <div><strong>${coin}</strong></div>
                            <div class="price" id="price-${coin}">Loading...</div>
                            <div class="levels">
                                <span class="tp" id="tp-${coin}">TP: --</span>
                                <span class="sl" id="sl-${coin}">SL: --</span>
                            </div>
                            <div class="meta">Leverage: 5x | Target: 7% | Risk: 5%</div>
                        </div>
                    `;
                    connectStream(coin);
                }
            }
        }

        function connectStream(coin) {
            const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${coin.toLowerCase()}usdt@ticker`);
            ws.onmessage = (e) => {
                const p = parseFloat(JSON.parse(e.data).c);
                // 5x leverage: 7% Profit = 1.4% move, 5% Loss = 1% move
                const tp = p * 1.014;
                const sl = p * 0.99;
                
                document.getElementById(`price-${coin}`).innerText = `$${p.toFixed(4)}`;
                document.getElementById(`tp-${coin}`).innerText = `TP: $${tp.toFixed(4)}`;
                document.getElementById(`sl-${coin}`).innerText = `SL: $${sl.toFixed(4)}`;
            };
        }

        initScanner();
    </script>
</body>
</html>
