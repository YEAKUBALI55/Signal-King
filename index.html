<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Live Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .data { font-size: 20px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <h1>Premium Dashboard</h1>
    
    <div class="card">
        <h2>🇮🇳 ভারতের জনসংখ্যা (Live)</h2>
        <div id="pop" class="data">Loading...</div>
    </div>

    <div class="card" onclick="alert('Details coming soon!')">
        <h2>🏛️ সরকারি সংবাদ</h2>
        <div id="news">শিরোনাম লোড হচ্ছে...</div>
    </div>

    <script>
        // জনসংখ্যা কাউন্টার সিমুলেশন
        let count = 1476625576;
        setInterval(() => { count += 1; document.getElementById('pop').innerText = count.toLocaleString(); }, 3000);
        
        // নিউজ API (এখানে NewsAPI বা অন্য সার্ভিস ব্যবহার করুন)
        fetch('https://newsapi.org/v2/top-headlines?country=in&apiKey=YOUR_API_KEY')
        .then(res => res.json())
        .then(data => document.getElementById('news').innerText = data.articles[0].title);
    </script>
</body>
</html>
