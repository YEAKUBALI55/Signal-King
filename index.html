<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalgola Live News Feed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; font-family: 'Hind Siliguri', sans-serif; overflow: hidden; }
        
        .feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .news-page { 
            height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; padding: 40px; 
            background: linear-gradient(180deg, #111, #000);
        }

        .title { color: #ffcc00; font-size: 2.2rem; margin-bottom: 25px; text-align: center; }
        .content { font-size: 1.4rem; line-height: 1.8; text-align: center; color: #eee; }
    </style>
</head>
<body>

    <div class="feed-container" id="feed"></div>

    <script>
        // আপনার সার্ভার থেকে লাইভ ডেটা আনার ফাংশন
        async function fetchNews() {
            try {
                // এখানে আপনার সার্ভারের URL বসান
                const response = await fetch('YOUR_SERVER_URL/get-live-news');
                const data = await response.json();
                renderNews(data.news);
            } catch (error) {
                console.log("Offline mode: using sample data");
                renderNews([
                    { title: "লালগোলার খবর", content: "লালগোলা স্টেশনে নতুন ট্রেনের সময়সূচী আপডেট করা হয়েছে।" },
                    { title: "মুর্শিদাবাদ আপডেট", content: "মুর্শিদাবাদ জেলায় নতুন উন্নয়ন প্রকল্প শুরু হয়েছে।" }
                ]);
            }
        }

        function renderNews(newsList) {
            const feed = document.getElementById('feed');
            newsList.forEach((news, index) => {
                const page = document.createElement('div');
                page.className = 'news-page';
                page.id = `page-${index}`;
                page.innerHTML = `<h1 class="title" id="title-${index}"></h1><p class="content" id="content-${index}"></p>`;
                feed.appendChild(page);
                
                // স্ক্রল করলে টাইপিং ট্রিগার হবে
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        typeText(`title-${index}`, news.title, 50);
                        setTimeout(() => typeText(`content-${index}`, news.content, 30), 1000);
                    }
                }, { threshold: 0.6 });
                observer.observe(page);
            });
        }

        async function typeText(id, text, speed) {
            const el = document.getElementById(id);
            for (let char of text) {
                el.innerHTML += char;
                await new Promise(r => setTimeout(r, speed));
            }
        }

        fetchNews();
    </script>
</body>
</html>
