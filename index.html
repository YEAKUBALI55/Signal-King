<!DOCTYPE html>
<html>
<head>
    <title>Advanced Momentum Scanner</title>
    <style>
        body { background: #0f172a; color: white; font-family: Arial; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #00c853; }
        .buy { color: #00c853; font-weight: bold; }
        .wait { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Advanced Momentum Scanner</h2>
    <div id="results">Scanning...</div>

<script>
// RSI Calculation
function getRSI(prices) {
    let gains = 0, losses = 0;
    for (let i = 1; i < 15; i++) {
        let diff = prices[i] - prices[i-1];
        if (diff >= 0) gains += diff; else losses -= diff;
    }
    let rs = (gains / 14) / (losses / 14);
    return 100 - (100 / (1 + rs));
}

// EMA Calculation
function getEMA(prices, period) {
    let k = 2 / (period + 1);
    let ema = prices[0];
    for(let i=1; i<prices.length; i++) ema = (prices[i] * k) + (ema * (1 - k));
    return ema;
}

async function scan() {
    const symbols = ['BTC', 'ETH', 'SOL', 'BNB'];
    let html = '';

    for (let symbol of symbols) {
        let res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}USDT&interval=1d&limit=100`);
        let data = await res.json();
        
        let prices = data.map(d => parseFloat(d[4]));
        let last = data[data.length-1];
        let prev = data[data.length-2];
        
        let price = parseFloat(last[4]);
        let yHigh = parseFloat(prev[2]);
        let yLow = parseFloat(prev[3]);
        let vol = parseFloat(last[5]);
        
        // Indicators
        let ema20 = getEMA(prices, 20);
        let ema50 = getEMA(prices, 50);
        let ema200 = getEMA(prices, 200);
        let rsi = getRSI(prices.slice(-15));
        
        // Entry & Risk
        let isBreakout = price > (yHigh * 1.0015);
        let sl = yLow - (price * 0.007); // ATR logic based on 0.5-1%
        let tp1 = price + (price - sl) * 1.5;
        let tp3 = price + (price - sl) * 3;
        
        // Confidence Score
        let score = 0;
        if (parseFloat(prev[4]) > parseFloat(prev[1])) score += 20;
        if (price > parseFloat(last[1])) score += 20;
        if (price > ema20 && ema20 > ema50) score += 30;
        if (rsi >= 55 && rsi <= 70) score += 20;
        if (vol > 10000) score += 10;
        
        let status = (isBreakout && ema20 > ema50 && rsi > 55) ? 'BUY' : 'WAIT';
        
        html += `<div class="card">
            <h3>${symbol} - <span class="${status === 'BUY' ? 'buy' : 'wait'}">${status}</span></h3>
            <p>Confidence: ${score}% | Trend: ${ema20 > ema50 ? 'Bullish' : 'Bearish'}</p>
            <p>Entry: ${isBreakout ? price.toFixed(2) : 'Wait for breakout at ' + (yHigh*1.0015).toFixed(2)}</p>
            <p>SL: ${sl.toFixed(2)} | TP3: ${tp3.toFixed(2)}</p>
        </div>`;
    }
    document.getElementById('results').innerHTML = html;
}

scan();
</script>
</body>
</html>
