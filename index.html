<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeakub Binance Momentum Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #111827 100%); 
            color: #ffffff; 
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }

        .gradient-border-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #00c853, #00e5ff, #a78bfa, #ff3d00);
            padding: 3px; 
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 200, 83, 0.2);
            display: flex;
        }

        .container {
            width: 100%;
            height: 100%;
            background: #0f172a; 
            border-radius: 21px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto; /* Allow scrolling if many coins match */
        }

        /* Status message for scanning */
        .status-msg {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            padding: 10px;
            font-weight: 600;
        }

        .coin-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            min-height: 80px;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .coin-icon {
            font-size: 26px;
            color: #00e5ff;
        }

        .coin-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .coin-pair {
            font-size: 12px;
            color: #64748b;
            display: block;
            margin-top: 2px;
        }

        .price-section {
            text-align: right;
        }

        .price {
            font-size: 22px;
            font-weight: 800;
            transition: color 0.2s ease;
        }

        .price-up { color: #00c853; text-shadow: 0 0 10px rgba(0, 200, 83, 0.3); }
        .price-down { color: #ff3d00; text-shadow: 0 0 10px rgba(255, 61, 0, 0.3); }

        /* Custom scrollbar for clean UI */
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="gradient-border-box">
        <div class="container" id="dashboard-container">
            <div class="status-msg" id="status-text">Scanning Binance Top Volume Coins for your Setup...</div>
            <!-- Matching coins will be dynamically injected here -->
        </div>
    </div>

    <script>
        // Array of high volume top coins listed on Binance to analyze
        const targetCoins = [
            'BTC','ETH','BNB','SOL','XRP','ADA','DOT','DOGE','SHIB','AVAX','LINK','LTC','MATIC','UNI','BCH',
            'FIL','XLM','ATOM','ETC','HBAR','ICP','GRT','AAVE','NEAR','ALGO','QNT','FLOW','EGLD','SAND','MANA',
            'THETA','EOS','AXS','XTZ','FTM','APE','GALA','MKR','CRV','OP','LDO','APT','ARB','INJ','TIA','SUI'
        ]; // You can expand this array up to 200+ coins easily

        const activeStreams = [];
        let lastPrices = {};
        let ws;

        // 1. Fetch historical K-line data from Binance API to scan the candles
        async function checkMomentumSetup(coin) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=1d&limit=3`);
                const data = await response.parseJSON ? await response.parseJSON() : await response.json();
                
                if (data && data.length >= 2) {
                    // Yesterday's Candle (Index length - 2)
                    const yOpen = parseFloat(data[data.length - 2][1]);
                    const yClose = parseFloat(data[data.length - 2][4]);
                    
                    // Today's Current Candle (Index length - 1)
                    const tOpen = parseFloat(data[data.length - 1][1]);
                    const tClose = parseFloat(data[data.length - 1][4]);

                    // Condition 1: Yesterday closed Green
                    const isYesterdayGreen = yClose > yOpen;
                    
                    // Condition 2: Today is Green
                    const isTodayGreen = tClose > tOpen;

                    // Condition 3: Today's current close is above 50% of Yesterday's candle body
                    const yesterdayBodyHeight = yClose - yOpen;
                    const yesterdayFiftyPercentLevel = yOpen + (yesterdayBodyHeight * 0.5);
                    const isAboveFiftyPercent = tClose >= yesterdayFiftyPercentLevel;

                    if (isYesterdayGreen && isTodayGreen && isAboveFiftyPercent) {
                        return true; // Match found!
                    }
                }
            } catch (error) {
                console.error(`Error scanning ${coin}:`, error);
            }
            return false;
        }

        // 2. Render UI Card for matched setup
        function createCoinCard(coin) {
            const container = document.getElementById('dashboard-container');
            
            // Prevent duplication
            if(document.getElementById(`card-${coin}`)) return;

            const card = document.createElement('div');
            card.className = 'coin-card';
            card.id = `card-${coin}`;
            card.innerHTML = `
                <div class="coin-info">
                    <i class="fas fa-bolt coin-icon"></i>
                    <div>
                        <span class="coin-name">${coin}</span>
                        <span class="coin-pair">${coin} / USDT</span>
                    </div>
                </div>
                <div class="price-section">
                    <div class="price" id="price-${coin}">Scanning...</div>
                </div>
            `;
            container.appendChild(card);
            activeStreams.push(coin.toLowerCase());
        }

        // 3. Start Live WebSocket connection for verified setups
        function startLiveStreaming() {
            if(activeStreams.length === 0) {
                document.getElementById('status-text').innerText = "No coins matching the 50% Momentum Setup right now.";
                return;
            }

            document.getElementById('status-text').style.display = 'none';

            const streams = activeStreams.map(coin => `${coin}usdt@ticker`).join('/');
            const wsUrl = `wss://stream.binance.com:9443/stream?streams=${streams}`;
            
            ws = new WebSocket(wsUrl);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                const coinSymbol = msg.stream.split('usdt')[0].toUpperCase();
                const currentPrice = parseFloat(msg.data.c); 
                
                const priceEl = document.getElementById(`price-${coinSymbol}`);
                if (priceEl) {
                    let formattedPrice = currentPrice.toLocaleString(undefined, { 
                        minimumFractionDigits: currentPrice < 2 ? 4 : 2,
                        maximumFractionDigits: currentPrice < 2 ? 4 : 2 
                    });
                    
                    priceEl.innerText = `$${formattedPrice}`;

                    if (lastPrices[coinSymbol]) {
                        if (currentPrice > lastPrices[coinSymbol]) {
                            priceEl.className = 'price price-up';
                        } else if (currentPrice < lastPrices[coinSymbol]) {
                            priceEl.className = 'price price-down';
                        }
                    }

                    setTimeout(() => { priceEl.className = 'price'; }, 800);
                    lastPrices[coinSymbol] = currentPrice;
                }
            };
        }

        // Initialize Scanner System
        async function initScanner() {
            for(let coin of targetCoins) {
                let isMatch = await checkMomentumSetup(coin);
                if(isMatch) {
                    createCoinCard(coin);
                }
                // Short interval to avoid heavy server hammering
                await new Promise(resolve => setTimeout(resolve, 50)); 
            }
            startLiveStreaming();
        }

        // Run scanner on load
        initScanner();
    </script>
</body>
</html>
