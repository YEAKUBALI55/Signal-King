<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeakub Binance Momentum Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #111827 100%); color: #ffffff; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px; }
        .gradient-border-box { width: 100%; height: 100%; background: linear-gradient(45deg, #00c853, #00e5ff, #a78bfa, #ff3d00); padding: 3px; border-radius: 24px; }
        .container { width: 100%; height: 100%; background: #0f172a; border-radius: 21px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .status-msg { text-align: center; color: #64748b; padding: 10px; font-weight: 600; }
        .coin-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 0 20px; height: 16%; display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 18px; font-weight: 700; }
        .coin-pair { font-size: 12px; color: #64748b; }
        .price { font-size: 22px; font-weight: 800; }
        .price-up { color: #00c853; }
        .price-down { color: #ff3d00; }
    </style>
</head>
<body>
    <div class="gradient-border-box">
        <div class="container" id="dashboard-container">
            <div class="status-msg" id="status-text">Scanning Market...</div>
        </div>
    </div>

    <script>
        const targetCoins = ['BTC','ETH','BNB','SOL','XRP','ADA','DOT','DOGE','SHIB','AVAX','LINK','LTC','MATIC','UNI','BCH','FIL','XLM','ATOM','ETC','HBAR','ICP','GRT','AAVE','NEAR','ALGO','QNT','FLOW','EGLD','SAND','MANA','THETA','EOS','AXS','XTZ','FTM','APE','GALA','MKR','CRV','OP','LDO','APT','ARB','INJ','TIA','SUI'];
        let lastPrices = {};

        async function checkMomentumSetup(coin) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=1d&limit=20`);
                const data = await response.json();
                if (!data || data.length < 20) return false;

                let score = 0;
                const yOpen = parseFloat(data[18][1]), yClose = parseFloat(data[18][4]), yLow = parseFloat(data[18][3]);
                const tOpen = parseFloat(data[19][1]), tClose = parseFloat(data[19][4]), tVolume = parseFloat(data[19][5]);

                if (yClose > yOpen) score += 20;
                if (tClose > tOpen) score += 20;
                if (tClose >= (yOpen + ((yClose - yOpen) * 0.5))) score += 20;
                
                let minLow = Math.min(...data.map(d => parseFloat(d[3])));
                if (yLow <= (minLow * 1.02)) score += 20;
                
                if (Math.abs(tClose - tOpen) > Math.abs(yClose - yOpen)) score += 10;
                
                const avgVolume = data.reduce((acc, curr) => acc + parseFloat(curr[5]), 0) / 20;
                if (tVolume > avgVolume) score += 10;

                return score >= 70 ? score : false;
            } catch (e) { return false; }
        }

        function createCoinCard(coin, score) {
            const container = document.getElementById('dashboard-container');
            const card = document.createElement('div');
            card.className = 'coin-card';
            card.innerHTML = `<div class="coin-info"><span class="coin-name">${coin} <small>(${score}/100)</small></span><span class="coin-pair">${coin}/USDT</span></div><div class="price" id="price-${coin}">Loading...</div>`;
            container.appendChild(card);
            
            const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${coin.toLowerCase()}usdt@ticker`);
            ws.onmessage = (event) => {
                const p = parseFloat(JSON.parse(event.data).c);
                const el = document.getElementById(`price-${coin}`);
                el.innerText = `$${p.toFixed(p < 1 ? 4 : 2)}`;
                el.className = lastPrices[coin] ? (p > lastPrices[coin] ? 'price price-up' : 'price price-down') : 'price';
                lastPrices[coin] = p;
            };
        }

        async function initScanner() {
            let matches = [];
            for(let coin of targetCoins) {
                let score = await checkMomentumSetup(coin);
                if(score) {
                    createCoinCard(coin, score);
                    matches.push(coin);
                    if(matches.length >= 5) break;
                }
            }
            document.getElementById('status-text').style.display = matches.length ? 'none' : 'block';
            if(!matches.length) document.getElementById('status-text').innerText = "No setups found.";
        }
        initScanner();
    </script>
</body>
</html>
