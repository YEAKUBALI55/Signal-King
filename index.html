<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Funny Baby Dance Live</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Full screen video container */
        .dance-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Force video to cover the screen perfectly */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay for "Live" indicator */
        .live-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="dance-container">
        <div class="live-badge">Live Feed</div>
        <!-- High quality funny baby dance loop -->
        <video 
            src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqbmV4dGZ4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.mp4" 
            autoplay 
            loop 
            muted 
            playsinline>
        </video>
    </div>

</body>
</html>
