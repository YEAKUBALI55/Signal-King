<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal King Alpha Quantum Scan Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        /* কালারফুল মডার্ন গ্রাডিয়েন্ট ব্যাকগ্রাউন্ড */
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%); 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .main-content { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top-left-radius: 28px; 
            border-top-right-radius: 28px; 
            margin-top: 24px; 
            padding: 24px 20px 95px 20px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            overflow-y: auto; 
            height: calc(100vh - 24px); 
            z-index: 10; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .global-scanner-bar { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            color: #f8fafc; 
            padding: 14px 18px; 
            border-radius: 16px; 
            font-size: 13px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 40px;
            gap: 12px;
        }

        .welcome-icon {
            font-size: 50px;
            background: linear-gradient(45deg, #00c853, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.08); opacity: 1; }
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #94a3b8;
            max-width: 280px;
            line-height: 1.5;
        }

        .status-glow-badge {
            margin-top: 8px;
            background: rgba(0, 200, 83, 0.1);
            color: #00c853;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(0, 200, 83, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px);
            height: 75px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 -8px 32px rgba(0,0,0,0.3); 
            z-index: 100; 
        }
        
        .nav-item-center { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #00c853; 
            font-size: 12px; 
            font-weight: 700; 
            gap: 4px; 
        }
        
        .nav-item-center i { font-size: 22px; }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- লাইভ স্ক্যানার বার -->
        <div class="global-scanner-bar">
            <span><i class="fas fa-microchip fa-spin" style="color: #00c853; margin-right: 6px;"></i> Binance Live Array Stream</span>
            <span id="active-slot-counter" style="background-color: #00875A; padding: 3px 10px; border-radius: 20px; font-size: 12px;">Slots: 0 / 3</span>
        </div>

        <!-- নতুন কালারফুল হোম ইন্টারফেস (কয়েন কার্ডগুলো রিমুভ করা হয়েছে) -->
        <div class="welcome-container">
            <div class="welcome-icon">
                <i class="fas fa-satellite-dish"></i>
            </div>
            <h1 class="welcome-title">SIGNAL KING PRO</h1>
            <p class="welcome-subtitle">Scanning the crypto horizon. Live algorithms are hunting for high-potential trade entry points...</p>
            <div class="status-glow-badge">
                <i class="fas fa-circle fa-fade"></i> System Operational
            </div>
        </div>
    </div>

    <!-- বটম নেভিগেশন বার -->
    <div class="bottom-nav">
        <div class="nav-item-center">
            <i class="fas fa-chart-bar"></i>
            <span>Signals Scanner</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        const maxSlots = 3;
        let activeCoins = new Set(JSON.parse(localStorage.getItem('activeCoins') || '[]'));
        let coinData = JSON.parse(localStorage.getItem('coinData') || '{}');

        function saveStateToStorage() {
            localStorage.setItem('activeCoins', JSON.stringify(Array.from(activeCoins)));
            localStorage.setItem('coinData', JSON.stringify(coinData));
        }

        function updateSlotUIHeader() {
            const element = document.getElementById('active-slot-counter');
            if(element) element.innerText = `Slots: ${activeCoins.size} / ${maxSlots}`;
        }

        // ব্যাকগ্রাউন্ডে স্লট ও ডেটা আপডেট হ্যান্ডল করার জন্য কল করা হয়েছে
        updateSlotUIHeader();

        // ব্যাকগ্রাউন্ড স্ট্রিমিং সচল রাখার জন্য কানেকশন চালু থাকবে
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            data.forEach(ticker => {
                if (ticker.s.endsWith('USDT') && !ticker.s.includes('UP') && !ticker.s.includes('DOWN')) {
                    const coin = ticker.s.replace('USDT', '');
                    const currentPrice = parseFloat(ticker.c);
                    const openPrice = parseFloat(ticker.o);
                    const percentChange = ((currentPrice - openPrice) / openPrice) * 100;

                    if (!activeCoins.has(coin) && activeCoins.size < maxSlots && Math.abs(percentChange) > 2.5) {
                        activeCoins.add(coin);
                        let decimals = currentPrice < 1 ? (currentPrice < 0.01 ? 6 : 4) : 2;
                        coinData[coin] = {
                            decimals: decimals,
                            currentTrackState: 'monitoring_entry',
                            direction: percentChange > 0 ? 'LONG' : 'SHORT'
                        };
                        saveStateToStorage();
                        updateSlotUIHeader();
                    }
                }
            });
        };
    </script>
</body>
</html>
