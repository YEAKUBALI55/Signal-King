<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Satellite View</title>
    <style>
        /* Force full screen, no scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Full screen iframe wrapper */
        .satellite-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* The actual view - embedding the high-res interactive globe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Minimal Overlay for a premium look */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
            border-left: 3px solid #00f2fe;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="satellite-wrapper">
        <div class="ui-overlay">
            <div style="font-size: 10px; opacity: 0.8;">LIVE FEED</div>
            <div style="font-weight: bold; letter-spacing: 1px;">SATELLITE MAPPING</div>
        </div>

        <!-- Embedding NASA/Google Earth View optimized for full screen -->
        <iframe 
            src="https://earth.google.com/web/@22.5726,88.3639,10a,800d,30y,0h,0t,0r/data=OgMKATA" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
