<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Binance BTC/USDT Live Order Stream</title>
    <style>
        /* Complete reset for an immersive full-screen edge-to-edge app experience */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0e11; /* Native Binance Dark background */
            color: #eaeded;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Container scales perfectly to the full screen viewport limits */
        .history-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Smooth animation row block styling */
        .trade-row {
            display: grid;
            grid-template-columns: 1.2fr 1.5fr 1fr;
            padding: 12px 8px;
            font-size: 15px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            animation: fadeInRow 0.25s ease-out forwards;
            opacity: 0;
            transform: translateY(-5px);
        }

        @keyframes fadeInRow {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Color profiles mapped natively to transaction execution markers */
        .buy {
            color: #0ecb81; /* Neon green for Buys */
            text-shadow: 0 0 4px rgba(14, 203, 129, 0.2);
        }

        .sell {
            color: #f6465d; /* Neon red for Sells */
            text-shadow: 0 0 4px rgba(246, 70, 93, 0.2);
        }

        .time-stamp {
            color: #848e9c;
        }

        .amount-val {
            text-align: right;
            color: #f1f5f9;
        }
    </style>
</head>
<body>

    <div class="history-container" id="tradeStream">
        <!-- Live rows inject natively at the top via WebSocket loops -->
    </div>

    <script>
        const streamContainer = document.getElementById('tradeStream');
        const maxRowsCount = 30; // Maximum elements kept visible on viewport simultaneously to maintain performance

        // Connect directly to the production Binance Public WebSocket system channel
        const binanceWS = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

        binanceWS.onmessage = (event) => {
            const tradeData = JSON.parse(event.data);

            // Extract native message target nodes from the execution payload
            const price = parseFloat(tradeData.p).toFixed(2);
            const amount = parseFloat(tradeData.q).toFixed(5);
            const isBuyerMaker = tradeData.m; // True indicates Maker Order (Sell Drive Execution)
            const tradeTime = new Date(tradeData.E).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            
            const marketSideClass = isBuyerMaker ? 'sell' : 'buy';

            // Generate row framework structure
            const rowHTML = document.createElement('div');
            rowHTML.className = `trade-row ${marketSideClass}`;
            rowHTML.innerHTML = `
                <span class="time-stamp">${tradeTime}</span>
                <span>$ ${parseFloat(price).toLocaleString()}</span>
                <span class="amount-val">${amount} BTC</span>
            `;

            // Prepends data dynamically at the top (Latest order shows first)
            streamContainer.insertBefore(rowHTML, streamContainer.firstChild);

            // Prunes memory structures actively to sustain high scrolling performance levels
            if (streamContainer.children.length > maxRowsCount) {
                streamContainer.removeChild(streamContainer.lastChild);
            }
        };

        binanceWS.onerror = (error) => {
            console.error("WebSocket Error: ", error);
        };

        binanceWS.onclose = () => {
            // Instantly trigger recovery link logic if system drops the carrier node
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        };
    </script>
</body>
</html>
