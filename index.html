<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal King Institutional Alpha Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #00875A; color: #333333; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        .main-content { background-color: #f4f6fa; border-top-left-radius: 28px; border-top-right-radius: 28px; margin-top: 24px; padding: 20px 15px 95px 15px; flex: 1; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; height: calc(100vh - 24px); z-index: 10; }
        
        .signal-card { background-color: white; border-radius: 18px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 12px; transition: all 0.4s ease; border: 2px solid transparent; }
        .card-entry-triggered { border-color: #ffb300; background-color: #fffde7; }
        .card-target-hit { border-color: #00c853; background-color: #f1fbf5; }
        .card-sl-hit { border-color: #ff3d00; background-color: #fdf2f2; }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .coin-title { font-size: 18px; font-weight: 800; color: #111111; display: flex; align-items: center; gap: 8px; }
        
        .strategy-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .strong-buy { background-color: #e8f5e9; color: #00c853; border: 1px solid #00c853; }
        .strong-sell { background-color: #ffebee; color: #ff3d00; border: 1px solid #ff3d00; }
        .neutral { background-color: #f5f5f5; color: #757575; border: 1px solid #e0e0e0; }
        
        .alert-status-badge { background-color: #1e293b; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }

        .price-container { background-color: #f8fafc; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #edf2f7; }
        .live-price { font-size: 24px; font-weight: 900; color: #00875A; }
        
        .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; font-weight: bold; }
        .level-box { padding: 8px; border-radius: 8px; color: white; display: flex; flex-direction: column; cursor: pointer; }
        .box-entry { background-color: #00c853; }
        .box-target { background-color: #2962ff; }
        .box-stop { background-color: #ff3d00; }
        .box-algo { background-color: #1e293b; color: #f8fafc; }
        
        .level-title { font-size: 9px; opacity: 0.9; text-transform: uppercase; display: flex; justify-content: space-between; }
        .level-value { font-size: 12px; font-weight: 700; margin-top: 2px; }
        .percent-badge { font-size: 8px; background: rgba(255,255,255,0.25); padding: 1px 4px; border-radius: 3px; }

        .level-hit-highlight { animation: pulse 1s infinite alternate; box-shadow: 0 0 10px currentColor; }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- Template (BTC/ETH) -->
        <div id="cards-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        const coins = ['BTC', 'ETH'];
        const coinData = {};
        
        coins.forEach(coin => {
            coinData[coin] = { decimals: 2, history: [], ema9: 0, ema21: 0, lastSignal: '', currentTrackState: 'standby', entryVal: 0, t1Val: 0, t2Val: 0, slVal: 0, direction: '' };
            document.getElementById('cards-container').innerHTML += `
                <div class="signal-card" id="card-${coin}">
                    <div class="card-header">
                        <div class="coin-title">${coin}/USDT <span class="strategy-badge neutral" id="signal-badge-${coin}">Scanning...</span></div>
                        <div class="alert-status-badge" id="alert-badge-${coin}">MONITORING</div>
                    </div>
                    <div class="price-container">
                        <div class="live-price" id="price-${coin}">Loading...</div>
                    </div>
                    <div class="levels-grid">
                        <div class="level-box box-entry" id="box-entry-${coin}" onclick="copyValue('${coin}_entry')">
                            <span class="level-title">Entry</span><span class="level-value" id="entry-${coin}">--</span>
                        </div>
                        <div class="level-box box-target" id="box-t1-${coin}" onclick="copyValue('${coin}_target1')">
                            <span class="level-title">T1 <span class="percent-badge" id="p-t1-${coin}">0%</span></span>
                            <span class="level-value" id="target1-${coin}">--</span>
                        </div>
                        <div class="level-box box-target" id="box-t2-${coin}" onclick="copyValue('${coin}_target2')" style="background-color: #0288d1;">
                            <span class="level-title">T2 <span class="percent-badge" id="p-t2-${coin}">0%</span></span>
                            <span class="level-value" id="target2-${coin}">--</span>
                        </div>
                        <div class="level-box box-stop" id="box-sl-${coin}" onclick="copyValue('${coin}_stop')">
                            <span class="level-title">SL <span class="percent-badge" id="p-sl-${coin}">0%</span></span>
                            <span class="level-value" id="stop-${coin}">--</span>
                        </div>
                    </div>
                </div>`;
        });

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const coinKey = data.s.replace('USDT', '');
            runQuantumEngine(coinKey, parseFloat(data.c), parseFloat(data.P));
        };

        function runQuantumEngine(coin, price, percentChange) {
            const config = coinData[coin];
            config.ema9 = (price * 0.2) + (config.ema9 * 0.8 || price);
            config.ema21 = (price * 0.095) + (config.ema21 * 0.905 || price);

            document.getElementById(`price-${coin}`).innerText = '$' + price.toFixed(config.decimals);

            // Lifecycle Lock logic
            if (config.currentTrackState === 'active_in_trade') {
                monitorTrade(coin, price);
                return;
            }

            // Entry monitoring logic
            if (config.currentTrackState === 'monitoring_entry') {
                const isHit = config.direction === 'LONG' ? (price <= config.entryVal) : (price >= config.entryVal);
                if (isHit) {
                    config.currentTrackState = 'active_in_trade';
                    document.getElementById(`card-${coin}`).className = "signal-card card-entry-triggered";
                    document.getElementById(`alert-badge-${coin}`).innerText = "ENTRY HIT";
                }
                return;
            }

            // New Signal Generator
            const bTrendUp = config.ema9 > config.ema21;
            if ((bTrendUp && percentChange > 0.1) || (!bTrendUp && percentChange < -0.1)) {
                const signal = bTrendUp ? 'STRONG BUY' : 'STRONG SELL';
                config.lastSignal = signal;
                config.direction = bTrendUp ? 'LONG' : 'SHORT';
                config.currentTrackState = 'monitoring_entry';
                
                config.entryVal = bTrendUp ? price * 0.999 : price * 1.001;
                config.t1Val = bTrendUp ? price * 1.005 : price * 0.995;
                config.t2Val = bTrendUp ? price * 1.012 : price * 0.988;
                config.slVal = bTrendUp ? price * 0.993 : price * 1.007;

                // Update UI with Percentages
                const calcPct = (val) => (((val - config.entryVal) / config.entryVal) * 100).toFixed(2);
                document.getElementById(`entry-${coin}`).innerText = config.entryVal.toFixed(config.decimals);
                document.getElementById(`target1-${coin}`).innerText = config.t1Val.toFixed(config.decimals);
                document.getElementById(`p-t1-${coin}`).innerText = calcPct(config.t1Val) + '%';
                document.getElementById(`target2-${coin}`).innerText = config.t2Val.toFixed(config.decimals);
                document.getElementById(`p-t2-${coin}`).innerText = calcPct(config.t2Val) + '%';
                document.getElementById(`stop-${coin}`).innerText = config.slVal.toFixed(config.decimals);
                document.getElementById(`p-sl-${coin}`).innerText = calcPct(config.slVal) + '%';
            }
        }

        function monitorTrade(coin, price) {
            const config = coinData[coin];
            const isTargetHit = config.direction === 'LONG' ? (price >= config.t1Val) : (price <= config.t1Val);
            const isSLHit = config.direction === 'LONG' ? (price <= config.slVal) : (price >= config.slVal);

            if (isTargetHit || isSLHit) {
                config.currentTrackState = 'standby';
                document.getElementById(`card-${coin}`).className = "signal-card " + (isTargetHit ? "card-target-hit" : "card-sl-hit");
                setTimeout(() => { document.getElementById(`card-${coin}`).className = "signal-card"; }, 5000);
            }
        }

        function copyValue(id) {
            const val = document.getElementById(id.replace('_', '-')).innerText;
            navigator.clipboard.writeText(val);
        }
    </script>
</body>
</html>
