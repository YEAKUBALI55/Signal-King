<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মুর্শিদাবাদ লাইভ নিউজ</title>

<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body{ background:#000; color:#fff; }
    .container{ max-width:900px; margin:auto; padding:15px; }
    .news{ background:#111; border-radius:15px; overflow:hidden; margin-bottom:20px; box-shadow:0 0 10px rgba(255,255,255,.15); }
    .news img{ width:100%; height:240px; object-fit:cover; }
    .news h2{ padding:15px 15px 5px; font-size:24px; }
    .news p{ padding:0 15px 10px; color:#ccc; font-size:17px; line-height:1.6; }
    
    .news-footer {
        padding: 0 15px 15px;
        font-size: 13px;
        color: #888;
        display: flex;
        justify-content: space-between;
    }
</style>
</head>

<body>

<div class="container" id="news"></div>

<script>
    const getFormattedDate = () => {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date().toLocaleDateString('bn-BD', options);
    };

    // মুর্শিদাবাদ ভিত্তিক খবরের তালিকা
    const news = [
        { title:"মুর্শিদাবাদে নতুন কৃষি প্রকল্প", image:"https://picsum.photos/900/500?4", desc:"মুর্শিদাবাদ জেলার কৃষকদের সুবিধার জন্য একটি নতুন সেচ প্রকল্পের কাজ শুরু হয়েছে।" },
        { title:"লালগোলায় ট্রেন পরিষেবায় আপডেট", image:"https://picsum.photos/900/500?5", desc:"লালগোলা স্টেশনে নতুন সিগন্যালিং ব্যবস্থার কাজ চলায় আজ ট্রেন চলাচলে কিছুটা পরিবর্তন আনা হয়েছে।" },
        { title:"বহরমপুরে স্বাস্থ্য সচেতনতা ক্যাম্প", image:"https://picsum.photos/900/500?6", desc:"বহরমপুর শহরে সাধারণ মানুষের স্বাস্থ্য পরীক্ষার জন্য একটি বিশেষ শিবিরের আয়োজন করা হয়েছে।" }
    ];

    const box = document.getElementById("news");
    const today = getFormattedDate();

    news.forEach(n => {
        box.innerHTML += `
            <div class="news">
                <img src="${n.image}" alt="খবরের ছবি">
                <h2>${n.title}</h2>
                <p>${n.desc}</p>
                <div class="news-footer">
                    <span>সূত্র: মুর্শিদাবাদ লাইভ</span>
                    <span>তারিখ: ${today}</span>
                </div>
            </div>
        `;
    });

    // ৩০ সেকেন্ড পর পর অটো-রিফ্রেশ
    setInterval(function() {
        location.reload();
    }, 30000); 

</script>
</body>
</html>
