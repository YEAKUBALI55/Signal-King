<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Momentum Scanner</title>
    <style>
        :root { --bg: #0f172a; --card: rgba(255,255,255,0.05); --green: #00c853; --red: #ff3d00; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #334155; }
        .price { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .signal-btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block; margin: 10px 0; }
        .buy { background: var(--green); }
        .wait { background: #f59e0b; }
        .data-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; }
        .confidence-bar { height: 6px; background: #334155; border-radius: 3px; margin: 10px 0; }
        .fill { height: 100%; background: var(--green); border-radius: 3px; }
    </style>
</head>
<body>

<div class="grid" id="app"></div>

<script>
async function fetchKlines(symbol, interval, limit) {
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`);
    return await res.json();
}

async function analyzeCoin(symbol) {
    const data = await fetchKlines(symbol, '1d', 200);
    const last = data[data.length - 1];
    const prev = data[data.length - 2];
    
    // Calculations
    const close = parseFloat(last[4]);
    const open = parseFloat(last[1]);
    const high = parseFloat(last[2]);
    const low = parseFloat(last[3]);
    const vol = parseFloat(last[5]);
    
    // EMA Calculation (Simplified)
    const ema20 = close * 0.95; // Dummy logic for example, use proper EMA formula
    const ema50 = close * 0.90;
    
    // RSI (Simplified)
    const rsi = 60; // Logic should iterate through closing prices
    
    // Scoring
    let score = 0;
    if(close > open) score += 20; // Yesterday/Today logic integration
    if(close > (open + (high-low)*0.5)) score += 20;
    if(close > ema20 && ema20 > ema50) score += 30;
    if(rsi > 55 && rsi < 70) score += 20;
    if(vol > 1000) score += 10;

    return {
        symbol,
        price: close,
        score,
        entry: high * 1.0015,
        sl: low * 0.995,
        tp1: close * 1.03,
        tp2: close * 1.05,
        tp3: close * 1.08,
        trend: 'Bullish',
        status: score > 80 ? 'BUY NOW' : 'WAIT'
    };
}

async function render() {
    const coins = ['BTC', 'ETH', 'SOL', 'BNB'];
    const app = document.getElementById('app');
    
    for (let s of coins) {
        const d = await analyzeCoin(s);
        app.innerHTML += `
            <div class="card">
                <h3>${d.symbol} / USDT</h3>
                <div class="price">$${d.price.toFixed(2)}</div>
                <div class="signal-btn ${d.status === 'BUY NOW' ? 'buy' : 'wait'}">${d.status}</div>
                <div class="confidence-bar"><div class="fill" style="width: ${d.score}%"></div></div>
                <div class="data-row"><span>Confidence:</span> <b>${d.score}%</b></div>
                <div class="data-row"><span>Entry:</span> <b>$${d.entry.toFixed(2)}</b></div>
                <div class="data-row"><span>Stop Loss:</span> <b>$${d.sl.toFixed(2)}</b></div>
                <div class="data-row"><span>TP 3 (1:3):</span> <b>$${d.tp3.toFixed(2)}</b></div>
                <div class="data-row"><span>Trend:</span> <b>${d.trend}</b></div>
            </div>
        `;
    }
}

render();
</script>
</body>
</html>
