<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murshidabad Live News</title>

<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body{ background:#000; color:#fff; }
    .container{ max-width:900px; margin:auto; padding:15px; }
    .news{ background:#111; border-radius:15px; overflow:hidden; margin-bottom:20px; box-shadow:0 0 10px rgba(255,255,255,.15); }
    .news img{ width:100%; height:240px; object-fit:cover; }
    .news h2{ padding:15px 15px 5px; font-size:24px; }
    .news p{ padding:0 15px 10px; color:#ccc; font-size:17px; line-height:1.6; }
    
    .news-footer {
        padding: 0 15px 15px;
        font-size: 13px;
        color: #888;
        display: flex;
        justify-content: space-between;
    }
</style>
</head>

<body>

<div class="container" id="news"></div>

<script>
    const getFormattedDate = () => {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date().toLocaleDateString('en-US', options);
    };

    // Murshidabad based news list
    const news = [
        { title:"New Agricultural Project in Murshidabad", image:"https://picsum.photos/900/500?4", desc:"A new irrigation project has been launched to support farmers in the Murshidabad district." },
        { title:"Train Service Update at Lalgola", image:"https://picsum.photos/900/500?5", desc:"Due to new signaling installation work at Lalgola station, there are some changes in train schedules today." },
        { title:"Health Awareness Camp in Berhampore", image:"https://picsum.photos/900/500?6", desc:"A special health check-up camp has been organized in Berhampore city for the general public." }
    ];

    const box = document.getElementById("news");
    const today = getFormattedDate();

    news.forEach(n => {
        box.innerHTML += `
            <div class="news">
                <img src="${n.image}" alt="News Image">
                <h2>${n.title}</h2>
                <p>${n.desc}</p>
                <div class="news-footer">
                    <span>Source: Murshidabad Live</span>
                    <span>Date: ${today}</span>
                </div>
            </div>
        `;
    });

    // Auto-refresh every 30 seconds
    setInterval(function() {
        location.reload();
    }, 30000); 

</script>
</body>
</html>
