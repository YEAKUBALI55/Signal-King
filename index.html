<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Signals</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #131722; color: #ffffff; margin: 0; padding: 15px; }
        .header { text-align: center; padding-bottom: 15px; border-bottom: 1px solid #2a2e39; }
        .header h1 { font-size: 20px; color: #2962ff; margin: 0; }
        .signal-card { background-color: #1e222d; border-radius: 12px; padding: 15px; margin-top: 15px; border-left: 5px solid #00c853; }
        .coin-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 18px; }
        .badge { background-color: rgba(0, 200, 83, 0.2); color: #00c853; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
        .details { margin-top: 10px; font-size: 14px; color: #b2b5be; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 TRADEMIND MINI APP</h1>
    </div>
    <div class="signal-card">
        <div class="coin-header">
            <span>BTC / USDT</span>
            <span class="badge">FUTURE LONG (20x)</span>
        </div>
        <div class="details">
            <div><b>Entry Range:</b> $65,200 - $65,500</div>
            <div><b>Target 1:</b> <span style="color:#00c853">$66,300</span></div>
            <div><b>Stop Loss:</b> <span style="color:#ff3d00">$64,100</span></div>
            <div style="margin-top: 8px; color: #ffeb3b;">Status: Active 🚀</div>
        </div>
    </div>
    <script>const tg = window.Telegram.WebApp; tg.expand();</script>
</body>
</html>
