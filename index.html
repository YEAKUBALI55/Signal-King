<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Signal Pro - Fullscreen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #0f172a; color: white; min-height: 100vh; padding: 10px; }
        
        .signal-card { background-color: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; width: 100%; border: 1px solid #334155; }
        .live-price { font-size: 32px; font-weight: 900; color: #10b981; text-align: center; margin: 10px 0; }
        .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .level-box { background: #334155; padding: 12px; border-radius: 8px; text-align: center; }
        .level-value { font-size: 18px; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div id="dynamic-cards-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const activeCoins = new Set();
        const coinData = {};

        // বাইন্যান্স টপ ২০০ ফিল্টার (উদাহরণস্বরূপ মূল কয়েনগুলো)
        const top200 = ["BTC", "ETH", "BNB", "SOL", "XRP", "ADA", "AVAX", "DOGE", "DOT", "LINK", "MATIC", "LTC", "ATOM", "UNI", "BCH", "ETC", "XLM", "FIL", "NEAR", "APE"];

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            data.forEach(ticker => {
                if (ticker.s.endsWith('USDT')) {
                    const coin = ticker.s.replace('USDT', '');
                    if (top200.includes(coin)) {
                        processStream(coin, parseFloat(ticker.c), parseFloat(ticker.o));
                    }
                }
            });
        };

        function processStream(coin, price, openPrice) {
            const percentChange = ((price - openPrice) / openPrice) * 100;

            if (activeCoins.has(coin)) {
                updateEngine(coin, price, percentChange);
            } else if (activeCoins.size < 1 && Math.abs(percentChange) > 2.0) {
                initializeTrade(coin, price, percentChange);
            }
        }

        function initializeTrade(coin, price, percentChange) {
            activeCoins.add(coin);
            const isLong = percentChange > 0;
            
            // 2% প্রফিট টার্গেট সেটআপ
            coinData[coin] = {
                direction: isLong ? 'LONG' : 'SHORT',
                entry: price,
                t1: isLong ? price * 1.02 : price * 0.98,
                sl: isLong ? price * 0.99 : price * 1.01
            };

            const container = document.getElementById('dynamic-cards-container');
            container.innerHTML = `
                <div class="signal-card" id="card-${coin}">
                    <h3>${coin}/USDT <span style="color:${isLong?'#10b981':'#ef4444'}">${isLong?'BUY':'SELL'}</span></h3>
                    <div class="live-price" id="price-${coin}">$${price.toFixed(2)}</div>
                    <div class="levels-grid">
                        <div class="level-box">Entry <span class="level-value">${price.toFixed(2)}</span></div>
                        <div class="level-box" style="background:#059669">Target (2%) <span class="level-value" id="t1-${coin}">${coinData[coin].t1.toFixed(2)}</span></div>
                    </div>
                </div>`;
        }

        function updateEngine(coin, price, pct) {
            document.getElementById(`price-${coin}`).innerText = '$' + price.toFixed(2);
            const config = coinData[coin];
            
            const hitTarget = config.direction === 'LONG' ? (price >= config.t1) : (price <= config.t1);
            if (hitTarget) {
                alert("Target 2% Hit for " + coin);
                activeCoins.delete(coin);
                document.getElementById(`card-${coin}`).remove();
            }
        }
    </script>
</body>
</html>
