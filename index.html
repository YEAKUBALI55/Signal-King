<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Perfect Screen Shorts Feed</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Native Snap-Scrolling Viewport */
        .shorts-container {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .shorts-container::-webkit-scrollbar {
            display: none;
        }
        .shorts-container {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

        /* Exact Full Screen Height Lock */
        .short-slide {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000000;
            overflow: hidden;
        }

        /* Crop Control Panels & Force Ultra-Full Screen Grid */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio Aspect */
            min-height: 100vh;
            min-width: 177.77vh; /* Reverse Aspect ratio to overflow horizontal controls */
            transform: translate(-50%, -50%) scale(1.15); 
            transform-origin: center center;
            pointer-events: none;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Touch layer handles screen interactions safely */
        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
        }

        .audio-tip {
            position: absolute;
            top: 40px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="shorts-container" id="shortsFeed">
        <!-- Injected Dynamically -->
    </div>

    <!-- Official YT API Loader Hook -->
    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const shortPool = [
            'q5d2OLc9D_c', 'JfVOs4VSpmA', 'd9MyW72ELq0', 'zSWdZVtXT7E', 'itnqEauWQZM',
            'tgbNymZ7vqY', '3JZ_D3K5xK0', '9bZkp7q19f0', '2Vv-BfVoq4g', 'jNQXAC9IVRw'
        ];

        const feed = document.getElementById('shortsFeed');
        let players = {};
        let isGlobalUnmuted = false; // Tracks if user enabled sound once

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        let totalLoaded = 0;
        function createSlides(count) {
            const list = shuffle([...shortPool]);
            list.forEach((id) => {
                const index = totalLoaded;
                const slide = document.createElement('div');
                slide.className = 'short-slide';
                slide.id = `slide_${index}`;

                slide.innerHTML = `
                    <div class="audio-tip" id="tip_${index}">Tap Screen for Sound</div>
                    <div class="video-wrapper">
                        <div id="player_div_${index}"></div>
                    </div>
                    <div class="touch-overlay" onclick="handleVolumeToggle(${index})"></div>
                `;
                feed.appendChild(slide);
                totalLoaded++;
            });
        }

        // Initialize dynamic viewport frame injection
        createSlides();

        // Standard YT API ready framework loader
        window.onYouTubeIframeAPIReady = function() {
            initPlayersForVisibleSlides();
        };

        function initPlayersForVisibleSlides() {
            for(let i=0; i < totalLoaded; i++) {
                const targetDiv = document.getElementById(`player_div_${i}`);
                if (!targetDiv || players[i]) continue;

                const slideEl = document.getElementById(`slide_${i}`);
                const videoId = shortPool[i % shortPool.length];

                players[i] = new YT.Player(`player_div_${i}`, {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        autoplay: 0,
                        controls: 0,
                        disablekb: 1,
                        fs: 0,
                        iv_load_policy: 3,
                        modestbranding: 1,
                        rel: 0,
                        showinfo: 0,
                        loop: 1,
                        playlist: videoId,
                        playsinline: 1,
                        cc_load_policy: 0
                    },
                    events: {
                        onReady: (event) => {
                            event.target.mute();
                            // If it's the very first slide, start playing immediately
                            if (i === 0) {
                                event.target.playVideo();
                            }
                        }
                    }
                });
            }
            setupSmartTracking();
        }

        // Smart Intersection Tracker: Kills previous sound / Starts current view instantly
        function setupSmartTracking() {
            const observerOptions = {
                root: feed,
                style: null,
                threshold: 0.6 // Fires when 60% of the slide enters the center viewport screen
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const idx = entry.target.id.split('_')[1];
                    const player = players[idx];

                    if (player && typeof player.playVideo === 'function') {
                        if (entry.isIntersecting) {
                            // Target video is active -> Play
                            if (isGlobalUnmuted) {
                                player.unMute();
                                document.getElementById(`tip_${idx}`).style.opacity = '0';
                            } else {
                                player.mute();
                            }
                            player.playVideo();
                        } else {
                            // Target video is hidden -> Pause instantly to stop sound overlap!
                            player.pauseVideo();
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.short-slide').forEach(slide => observer.observe(slide));
        }

        // Handles clean audio toggle state sharing across all tracks
        window.handleVolumeToggle = function(index) {
            const player = players[index];
            const tip = document.getElementById(`tip_${index}`);

            if (player) {
                if (!isGlobalUnmuted) {
                    isGlobalUnmuted = true;
                    player.unMute();
                    tip.style.opacity = '0';
                    // Synchronously update all other cards so they play with audio when scrolled into view
                    Object.keys(players).forEach(k => {
                        if(players[k] && k != index) players[k].unMute();
                        const extraTip = document.getElementById(`tip_${k}`);
                        if(extraTip) extraTip.style.opacity = '0';
                    });
                } else {
                    isGlobalUnmuted = false;
                    player.mute();
                    tip.style.opacity = '1';
                    tip.innerText = "Muted";
                }
            }
        };

        // Endless scroll loop generator
        feed.addEventListener('scroll', () => {
            if (feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 300) {
                createSlides();
                initPlayersForVisibleSlides();
            }
        });
    </script>
</body>
</html>
