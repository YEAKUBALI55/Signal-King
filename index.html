<div class="card">
    <h2>🏛️ সরকারি সংবাদ (PIB Live)</h2>
    <div id="news" style="color: #333; margin-top: 10px; line-height: 1.5;">
        সংবাদ লোড হচ্ছে...
    </div>
</div>

<script>
    async function fetchPibNews() {
        const newsContainer = document.getElementById('news');
        // PIB-এর RSS ফিডকে JSON-এ রূপান্তর করার জন্য একটি ফ্রি সার্ভিস ব্যবহার করা হয়েছে
        const rssUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://pib.gov.in/RSSFeed.aspx";

        try {
            let response = await fetch(rssUrl);
            let data = await response.json();
            
            if (data.items && data.items.length > 0) {
                // প্রথম ৫টি সংবাদ শিরোনাম দেখাবে
                let html = "<ul>";
                for(let i = 0; i < 5; i++) {
                    html += `<li style="margin-bottom:10px;"><a href="${data.items[i].link}" target="_blank">${data.items[i].title}</a></li>`;
                }
                html += "</ul>";
                newsContainer.innerHTML = html;
            } else {
                newsContainer.innerText = "বর্তমানে কোনো সংবাদ নেই।";
            }
        } catch (error) {
            newsContainer.innerText = "সংবাদ সার্ভার আপাতত ব্যস্ত।";
        }
    }

    fetchPibNews();
</script>
