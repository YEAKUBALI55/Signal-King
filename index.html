<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Signal King - Real-time trading signals scanner">
    <title>Signal King - Signals Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Signal King</h1>
            <span id="active-slot-counter" class="slot-counter">Slots: 0 / 3</span>
        </div>

        <div id="dynamic-cards-container" aria-live="polite" role="region" aria-label="Active trading signals"></div>
    </div>

    <div class="bottom-nav" aria-hidden="false">
        <div class="nav-item-center">
            <i class="fas fa-chart-bar"></i>
            <span>Signals Scanner</span>
        </div>
    </div>

    <div id="toast" role="status" aria-live="polite" aria-atomic="true">Value copied!</div>

    <!-- Load external script -->
    <script src="app.js"></script>
</body>
</html>
