<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal King Institutional Alpha Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #00875A; color: #333333; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        .main-content { background-color: #f4f6fa; border-top-left-radius: 28px; border-top-right-radius: 28px; margin-top: 24px; padding: 20px 15px 95px 15px; flex: 1; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; height: calc(100vh - 24px); z-index: 10; }
        
        .signal-card { background-color: white; border-radius: 18px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 12px; transition: all 0.4s ease; border: 2px solid transparent; }
        
        /* Dynamic Card Status Styles */
        .card-entry-triggered { border-color: #ffb300; background-color: #fffde7; box-shadow: 0 0 15px rgba(255,179,0,0.2); }
        .card-target-hit { border-color: #00c853; background-color: #f1fbf5; box-shadow: 0 0 15px rgba(0,200,83,0.25); }
        .card-sl-hit { border-color: #ff3d00; background-color: #fdf2f2; }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .coin-title { font-size: 18px; font-weight: 800; color: #111111; display: flex; align-items: center; gap: 8px; }
        
        .strategy-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .strong-buy { background-color: #e8f5e9; color: #00c853; border: 1px solid #00c853; }
        .strong-sell { background-color: #ffebee; color: #ff3d00; border: 1px solid #ff3d00; }
        .neutral { background-color: #f5f5f5; color: #757575; border: 1px solid #e0e0e0; }
        
        .alert-status-badge { background-color: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-entry-hit { background-color: #ffb300; color: #000; }
        .badge-target-hit { background-color: #00c853; color: #fff; }
        .badge-sl-hit { background-color: #ff3d00; color: #fff; }

        .price-container { background-color: #f8fafc; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid #edf2f7; }
        .price-label { font-size: 12px; color: #64748b; font-weight: 500; margin-bottom: 2px; }
        .live-price { font-size: 28px; font-weight: 900; color: #00875A; }
        .price-change { font-size: 13px; font-weight: 700; margin-top: 2px; display: inline-flex; align-items: center; gap: 4px; }
        .change-up { color: #00c853; }
        .change-down { color: #ff3d00; }

        .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; font-weight: bold; }
        .level-box { padding: 10px; border-radius: 8px; color: white; display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
        .box-entry { background-color: #00c853; }
        .box-target { background-color: #2962ff; }
        .box-stop { background-color: #ff3d00; }
        .box-algo { background-color: #1e293b; color: #f8fafc; }
        
        .level-title { font-size: 9px; opacity: 0.9; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .level-value { font-size: 13px; font-weight: 700; margin-top: 2px; }
        .percent-badge { font-size: 8px; background: rgba(255,255,255,0.25); padding: 1px 4px; border-radius: 3px; font-weight: 900; }

        .level-hit-highlight { animation: pulseHighlight 1.5s infinite alternate; box-shadow: 0 0 10px currentColor; }
        @keyframes pulseHighlight { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }

        .box-info-bar { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; grid-column: span 2; text-align: center; padding: 7px; border-radius: 8px; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: white; height: 75px; display: flex; justify-content: center; align-items: center; border-top: 1px solid #e2e8f0; box-shadow: 0 -4px 20px rgba(0,0,0,0.03); z-index: 100; }
        .nav-item-center { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00875A; font-size: 12px; font-weight: 700; gap: 4px; }
        .nav-item-center i { font-size: 22px; }

        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- Cards Container (Dynamically injected via JavaScript) -->
        <div id="cards-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item-center">
            <i class="fas fa-chart-bar"></i>
            <span>Signals</span>
        </div>
    </div>
    
    <div id="toast">Value copied!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        // Native Audio Alert Generator
        function playAlertSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);

                if (type === 'target') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'entry') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(440, ctx.currentTime);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
            } catch(e) { console.log("Audio block bypass"); }
        }

        const coins = ['BTC', 'ETH'];
        const coinData = {};
        
        // Dynamically generating elements 
        coins.forEach(coin => {
            coinData[coin] = { decimals: 2, history: [], ema9: 0, ema21: 0, lastSignal: '', currentTrackState: 'standby', entryVal: 0, t1Val: 0, t2Val: 0, slVal: 0, direction: '' };
            document.getElementById('cards-container').innerHTML += `
                <div class="signal-card" id="card-${coin}">
                    <div class="card-header">
                        <div class="coin-title">${coin}/USDT <span class="strategy-badge neutral" id="signal-badge-${coin}">Scanning...</span></div>
                        <div class="alert-status-badge" id="alert-badge-${coin}">SCANNING</div>
                    </div>
                    <div class="price-container">
                        <div class="price-label">Live Feed Price</div>
                        <div class="live-price" id="price-${coin}">Loading...</div>
                        <div class="price-change" id="change-${coin}">0.00%</div>
                    </div>
                    <div class="levels-grid">
                        <div class="level-box box-entry" id="box-entry-${coin}" onclick="copyValue('${coin}_entry')">
                            <span class="level-title">Optimum Entry</span><span class="level-value" id="entry-${coin}">--</span>
                        </div>
                        <div class="level-box box-target" id="box-t1-${coin}" onclick="copyValue('${coin}_target1')">
                            <span class="level-title">T1 <span class="percent-badge" id="p-t1-${coin}">0%</span></span>
                            <span class="level-value" id="target1-${coin}">--</span>
                        </div>
                        <div class="level-box box-target" id="box-t2-${coin}" onclick="copyValue('${coin}_target2')" style="background-color: #0288d1;">
                            <span class="level-title">T2 <span class="percent-badge" id="p-t2-${coin}">0%</span></span>
                            <span class="level-value" id="target2-${coin}">--</span>
                        </div>
                        <div class="level-box box-stop" id="box-sl-${coin}" onclick="copyValue('${coin}_stop')">
                            <span class="level-title">SL <span class="percent-badge" id="p-sl-${coin}">0%</span></span>
                            <span class="level-value" id="stop-${coin}">--</span>
                        </div>
                        <div class="level-box box-algo"><span class="level-title">Conf. Score</span><span class="level-value">93.4%</span></div>
                        <div class="level-box box-algo" style="background-color: #475569;"><span class="level-title">Engine</span><span class="level-value" id="status-text-${coin}">Ready</span></div>
                        <div class="box-info-bar" id="info-${coin}"><i class="fas fa-radar fa-spin"></i> Initializing System Tracker...</div>
                    </div>
                </div>`;
        });

        // Live Feed Connection
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const coinKey = data.s.replace('USDT', '');
            if (coinData[coinKey]) {
                runQuantumEngine(coinKey, parseFloat(data.c), parseFloat(data.P));
            }
        };

        function runQuantumEngine(coin, price, percentChange) {
            const config = coinData[coin];
            config.ema9 = (price * 0.2) + (config.ema9 * 0.8 || price);
            config.ema21 = (price * 0.095) + (config.ema21 * 0.905 || price);

            document.getElementById(`price-${coin}`).innerText = '$' + price.toFixed(config.decimals);
            const changeEl = document.getElementById(`change-${coin}`);
            changeEl.innerText = (percentChange >= 0 ? '+' : '') + percentChange.toFixed(2) + '%';
            changeEl.className = `price-change ${percentChange >= 0 ? 'change-up' : 'change-down'}`;

            // Check 1: If order is locked in trade, only monitor targets (Block setup modifications)
            if (config.currentTrackState === 'active_in_trade') {
                monitorTrade(coin, price);
                return;
            }

            // Check 2: If entry is already assigned, monitor live price intersection
            if (config.currentTrackState === 'monitoring_entry') {
                document.getElementById(`info-${coin}`).innerHTML = `<i class="fas fa-bullseye" style="color: #ffb300;"></i> Entry Locked at $${config.entryVal.toFixed(config.decimals)}. Awaiting Target Activation...`;
                
                const isHit = config.direction === 'LONG' ? (price <= config.entryVal) : (price >= config.entryVal);
                if (isHit) {
                    config.currentTrackState = 'active_in_trade'; // Core Lifecycle Lock Engaged
                    document.getElementById(`card-${coin}`).className = "signal-card card-entry-triggered";
                    document.getElementById(`alert-badge-${coin}`).innerText = "ENTRY HIT";
                    document.getElementById(`alert-badge-${coin}`).className = "alert-status-badge badge-entry-hit";
                    document.getElementById(`status-text-${coin}`).innerText = "LOCKED 🔒";
                    document.getElementById(`box-entry-${coin}`).classList.add('level-hit-highlight');
                    
                    playAlertSound('entry');
                    if(window.Telegram && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                }
                return;
            }

            // Phase 0: Standby Strategy Calculation
            const bTrendUp = config.ema9 > config.ema21;
            let signalText = 'NEUTRAL';
            let badgeClass = 'strategy-badge neutral';

            if (bTrendUp && percentChange > 0.15) {
                signalText = 'STRONG BUY'; badgeClass = 'strategy-badge strong-buy';
            } else if (!bTrendUp && percentChange < -0.15) {
                signalText = 'STRONG SELL'; badgeClass = 'strategy-badge strong-sell';
            }

            // Set fixed levels exclusively when system is in 'standby' mode
            if (config.currentTrackState === 'standby' && signalText !== 'NEUTRAL' && config.lastSignal !== signalText) {
                config.lastSignal = signalText;
                config.direction = signalText === 'STRONG BUY' ? 'LONG' : 'SHORT';
                config.currentTrackState = 'monitoring_entry';

                resetCardVisuals(coin);

                config.entryVal = config.direction === 'LONG' ? price * 0.999 : price * 1.001;
                config.t1Val = config.direction === 'LONG' ? price * 1.005 : price * 0.995;
                config.t2Val = config.direction === 'LONG' ? price * 1.012 : price * 0.988;
                config.slVal = config.direction === 'LONG' ? price * 0.993 : price * 1.007;

                // Absolute Calculation of future profit/loss percentage relative to entry
                const calcPct = (targetVal) => {
                    const pct = ((targetVal - config.entryVal) / config.entryVal) * 100;
                    return (config.direction === 'SHORT' ? -pct : pct).toFixed(2);
                };

                const prefix = (val) => (parseFloat(val) > 0 ? '+' : '');

                document.getElementById(`entry-${coin}`).innerText = config.entryVal.toFixed(config.decimals);
                
                document.getElementById(`target1-${coin}`).innerText = config.t1Val.toFixed(config.decimals);
                document.getElementById(`p-t1-${coin}`).innerText = prefix(calcPct(config.t1Val)) + calcPct(config.t1Val) + '%';
                
                document.getElementById(`target2-${coin}`).innerText = config.t2Val.toFixed(config.decimals);
                document.getElementById(`p-t2-${coin}`).innerText = prefix(calcPct(config.t2Val)) + calcPct(config.t2Val) + '%';
                
                document.getElementById(`stop-${coin}`).innerText = config.slVal.toFixed(config.decimals);
                document.getElementById(`p-sl-${coin}`).innerText = calcPct(config.slVal) + '%'; // Losses implicitly structured
                
                const badgeEl = document.getElementById(`signal-badge-${coin}`);
                badgeEl.innerText = signalText; badgeEl.className = badgeClass;
            } else {
                document.getElementById(`info-${coin}`).innerHTML = `<i class="fas fa-radiation fa-spin"></i> Engine scanning network blocks...`;
            }
        }

        function monitorTrade(coin, price) {
            const config = coinData[coin];
            document.getElementById(`info-${coin}`).innerHTML = `<i class="fas fa-lock" style="color: #ff3d00;"></i> Position Locked. Active execution tracks live...`;

            const isTargetHit = config.direction === 'LONG' ? (price >= config.t1Val) : (price <= config.t1Val);
            const isSLHit = config.direction === 'LONG' ? (price <= config.slVal) : (price >= config.slVal);

            if (isTargetHit || isSLHit) {
                config.currentTrackState = 'standby'; // System unlocked
                config.lastSignal = ''; // Reset core evaluation loop
                
                document.getElementById(`card-${coin}`).className = "signal-card " + (isTargetHit ? "card-target-hit" : "card-sl-hit");
                document.getElementById(`alert-badge-${coin}`).innerText = isTargetHit ? "TARGET 1 HIT 🎉" : "SL HIT ❌";
                document.getElementById(`alert-badge-${coin}`).className = "alert-status-badge " + (isTargetHit ? "badge-target-hit" : "badge-sl-hit");
                document.getElementById(`status-text-${coin}`).innerText = "Ready";
                
                document.getElementById(isTargetHit ? `box-t1-${coin}` : `box-sl-${coin}`).classList.add('level-hit-highlight');
                
                playAlertSound(isTargetHit ? 'target' : 'error');
                if(window.Telegram && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred(isTargetHit ? 'success' : 'error');
                }
            }
        }

        function resetCardVisuals(coin) {
            document.getElementById(`box-entry-${coin}`).classList.remove('level-hit-highlight');
            document.getElementById(`box-t1-${coin}`).classList.remove('level-hit-highlight');
            document.getElementById(`box-sl-${coin}`).classList.remove('level-hit-highlight');
            document.getElementById(`card-${coin}`).className = "signal-card";
            document.getElementById(`alert-badge-${coin}`).innerText = "AWAITING ENTRY";
            document.getElementById(`alert-badge-${coin}`).className = "alert-status-badge";
            document.getElementById(`status-text-${coin}`).innerText = "Tracking";
        }

        function copyValue(id) {
            const val = document.getElementById(id.replace('_', '-')).innerText;
            if (val !== '--' && val !== 'Loading...') {
                navigator.clipboard.writeText(val);
                const toast = document.getElementById('toast');
                toast.innerText = `Copied Target: ${val}`;
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
                if(window.Telegram && tg.HapticFeedback) tg.HapticFeedback.impact('heavy');
            }
        }
    </script>
</body>
</html>
