<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal King Alpha Quantum Scan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #00875A; color: #333333; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        .main-content { background-color: #f4f6fa; border-top-left-radius: 28px; border-top-right-radius: 28px; margin-top: 24px; padding: 20px 15px 95px 15px; flex: 1; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; height: calc(100vh - 24px); z-index: 10; }
        
        .signal-card { background-color: white; border-radius: 18px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 12px; transition: all 0.4s ease; border: 2px solid transparent; }
        
        /* Dynamic Card States */
        .card-entry-triggered { border-color: #ffb300; background-color: #fffde7; box-shadow: 0 0 15px rgba(255,179,0,0.2); }
        .card-target-hit { border-color: #00c853; background-color: #f1fbf5; box-shadow: 0 0 15px rgba(0,200,83,0.25); }
        .card-sl-hit { border-color: #ff3d00; background-color: #fdf2f2; }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .coin-title { font-size: 18px; font-weight: 800; color: #111111; display: flex; align-items: center; gap: 8px; }
        
        .strategy-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .strong-buy { background-color: #e8f5e9; color: #00c853; border: 1px solid #00c853; }
        .strong-sell { background-color: #ffebee; color: #ff3d00; border: 1px solid #ff3d00; }
        
        .alert-status-badge { background-color: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-entry-hit { background-color: #ffb300; color: #000; }
        .badge-target-hit { background-color: #00c853; color: #fff; }
        .badge-sl-hit { background-color: #ff3d00; color: #fff; }

        .price-container { background-color: #f8fafc; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid #edf2f7; }
        .price-label { font-size: 12px; color: #64748b; font-weight: 500; margin-bottom: 2px; }
        .live-price { font-size: 28px; font-weight: 900; color: #00875A; }
        .price-change { font-size: 13px; font-weight: 700; margin-top: 2px; display: inline-flex; align-items: center; gap: 4px; }
        .change-up { color: #00c853; }
        .change-down { color: #ff3d00; }

        .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; font-weight: bold; }
        .level-box { padding: 10px; border-radius: 8px; color: white; display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
        .box-entry { background-color: #00c853; }
        .box-target { background-color: #2962ff; }
        .box-stop { background-color: #ff3d00; }
        .box-algo { background-color: #1e293b; color: #f8fafc; }
        
        .level-title { font-size: 9px; opacity: 0.9; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .level-value { font-size: 13px; font-weight: 700; margin-top: 2px; }
        .percent-badge { font-size: 8px; background: rgba(255,255,255,0.25); padding: 1px 4px; border-radius: 3px; font-weight: 900; }

        .level-hit-highlight { animation: pulseHighlight 1.5s infinite alternate; box-shadow: 0 0 10px currentColor; }
        @keyframes pulseHighlight { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }

        .box-info-bar { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; grid-column: span 2; text-align: center; padding: 7px; border-radius: 8px; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: white; height: 75px; display: flex; justify-content: center; align-items: center; border-top: 1px solid #e2e8f0; box-shadow: 0 -4px 20px rgba(0,0,0,0.03); z-index: 100; }
        .nav-item-center { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00875A; font-size: 12px; font-weight: 700; gap: 4px; }
        .nav-item-center i { font-size: 22px; }

        .global-scanner-bar { background-color: #1e293b; color: #f8fafc; padding: 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- Global Live Core Engine Counter -->
        <div class="global-scanner-bar">
            <span><i class="fas fa-microchip fa-spin" style="color: #00c853; margin-right: 6px;"></i> Binance Live Array Stream</span>
            <span id="active-slot-counter" style="background-color: #00875A; padding: 2px 8px; border-radius: 20px;">Slots: 0 / 3</span>
        </div>

        <!-- 3-Slot Cards Container (Injected dynamically) -->
        <div id="dynamic-cards-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item-center">
            <i class="fas fa-chart-bar"></i>
            <span>Signals Scanner</span>
        </div>
    </div>
    
    <div id="toast">Value copied!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        // Audio Oscillator Architecture
        function playAlertSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);

                if (type === 'target') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'entry') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(440, ctx.currentTime);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
            } catch(e) { console.log("Audio block bypass active"); }
        }

        // Global Storage for active slots
        const maxSlots = 3;
        const activeCoins = new Set();
        const coinData = {};

        // Connect directly to the complete Binance Mini-Ticker endpoint stream
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            data.forEach(ticker => {
                // Focus strictly on standard USDT pairs and exclude leveraged bull/bear tokens
                if (ticker.s.endsWith('USDT') && !ticker.s.includes('UP') && !ticker.s.includes('DOWN')) {
                    const coin = ticker.s.replace('USDT', '');
                    processGlobalStream(coin, parseFloat(ticker.c), parseFloat(ticker.o));
                }
            });
        };

        function processGlobalStream(coin, currentPrice, openPrice) {
            // Live calculated % variation
            const percentChange = ((currentPrice - openPrice) / openPrice) * 100;

            // Condition 1: Coin is active inside one of the 3 slots -> Feed live data to execute trade logic
            if (activeCoins.has(coin)) {
                runQuantumEngine(coin, currentPrice, percentChange);
                return;
            }

            // Condition 2: If we have free slots, check if this new token has high enough volatility to initialize a trade setup
            if (activeCoins.size < maxSlots && Math.abs(percentChange) > 2.5) {
                initializeNewTradeSlot(coin, currentPrice, percentChange);
            }
        }

        function initializeNewTradeSlot(coin, price, percentChange) {
            activeCoins.add(coin);
            updateSlotUIHeader();

            const isLong = percentChange > 0;
            const direction = isLong ? 'LONG' : 'SHORT';

            // Establish dynamic trailing decimals based on token absolute base price size
            let decimals = 2;
            if (price < 1) decimals = 4;
            if (price < 0.01) decimals = 6;

            // Lock values permanently into config parameters
            coinData[coin] = {
                decimals: decimals,
                currentTrackState: 'monitoring_entry',
                direction: direction,
                lastSignal: isLong ? 'STRONG BUY' : 'STRONG SELL',
                entryVal: isLong ? price * 0.9985 : price * 1.0015,
                t1Val: isLong ? price * 1.0060 : price * 0.9940,
                t2Val: isLong ? price * 1.0140 : price * 0.9860,
                slVal: isLong ? price * 0.9920 : price * 1.0080
            };

            // Calculate precise locked target percentages from entry base point
            const c = coinData[coin];
            const calcPct = (targetVal) => {
                const pct = ((targetVal - c.entryVal) / c.entryVal) * 100;
                return (c.direction === 'SHORT' ? -pct : pct).toFixed(2);
            };
            const prefix = (val) => (parseFloat(val) > 0 ? '+' : '');

            // Inject the custom component structure layout directly inside container UI
            const cardContainer = document.getElementById('dynamic-cards-container');
            const cardHtml = `
                <div class="signal-card" id="card-${coin}">
                    <div class="card-header">
                        <div class="coin-title">${coin}/USDT <span class="strategy-badge ${isLong ? 'strong-buy' : 'strong-sell'}" id="signal-badge-${coin}">${c.lastSignal}</span></div>
                        <div class="alert-status-badge" id="alert-badge-${coin}">AWAITING ENTRY</div>
                    </div>
                    <div class="price-container">
                        <div class="price-label">Live Price Tracking</div>
                        <div class="live-price" id="price-${coin}">$${price.toFixed(decimals)}</div>
                        <div class="price-change" id="change-${coin}">${prefix(percentChange)}${percentChange.toFixed(2)}%</div>
                    </div>
                    <div class="levels-grid">
                        <div class="level-box box-entry" id="box-entry-${coin}" onclick="copyValue('${coin}_entry')">
                            <span class="level-title">Optimum Entry</span><span class="level-value" id="entry-${coin}">${c.entryVal.toFixed(decimals)}</span>
                        </div>
                        <div class="level-box box-target" id="box-t1-${coin}" onclick="copyValue('${coin}_target1')">
                            <span class="level-title">T1 <span class="percent-badge" id="p-t1-${coin}">${prefix(calcPct(c.t1Val))}${calcPct(c.t1Val)}%</span></span>
                            <span class="level-value" id="target1-${coin}">${c.t1Val.toFixed(decimals)}</span>
                        </div>
                        <div class="level-box box-target" id="box-t2-${coin}" onclick="copyValue('${coin}_target2')" style="background-color: #0288d1;">
                            <span class="level-title">T2 <span class="percent-badge" id="p-t2-${coin}">${prefix(calcPct(c.t2Val))}${calcPct(c.t2Val)}%</span></span>
                            <span class="level-value" id="target2-${coin}">${c.t2Val.toFixed(decimals)}</span>
                        </div>
                        <div class="level-box box-stop" id="box-sl-${coin}" onclick="copyValue('${coin}_stop')">
                            <span class="level-title">SL <span class="percent-badge" id="p-sl-${coin}">${calcPct(c.slVal)}%</span></span>
                            <span class="level-value" id="stop-${coin}">${c.slVal.toFixed(decimals)}</span>
                        </div>
                        <div class="level-box box-algo"><span class="level-title">Engine Slot</span><span class="level-value" style="color: #00c853;">ACTIVE</span></div>
                        <div class="level-box box-algo" style="background-color: #475569;"><span class="level-title">Status</span><span class="level-value" id="status-text-${coin}">Ready</span></div>
                        <div class="box-info-bar" id="info-${coin}"><i class="fas fa-bullseye" style="color: #ffb300;"></i> Entry levels deployed. Monitoring market tap...</div>
                    </div>
                </div>`;
            
            cardContainer.insertAdjacentHTML('beforeend', cardHtml);
        }

        function runQuantumEngine(coin, price, percentChange) {
            const config = coinData[coin];
            const prefix = percentChange >= 0 ? '+' : '';

            // Update real-time metric indicators
            document.getElementById(`price-${coin}`).innerText = '$' + price.toFixed(config.decimals);
            const changeEl = document.getElementById(`change-${coin}`);
            changeEl.innerText = prefix + percentChange.toFixed(2) + '%';
            changeEl.className = `price-change ${percentChange >= 0 ? 'change-up' : 'change-down'}`;

            // Phase B Locked state: Trade execution position is active
            if (config.currentTrackState === 'active_in_trade') {
                monitorActiveTradeState(coin, price);
                return;
            }

            // Phase A Locked state: Price has not crossed assigned fixed entry level point yet
            if (config.currentTrackState === 'monitoring_entry') {
                const isHit = config.direction === 'LONG' ? (price <= config.entryVal) : (price >= config.entryVal);
                if (isHit) {
                    config.currentTrackState = 'active_in_trade';
                    
                    document.getElementById(`card-${coin}`).className = "signal-card card-entry-triggered";
                    document.getElementById(`alert-badge-${coin}`).innerText = "ENTRY HIT";
                    document.getElementById(`alert-badge-${coin}`).className = "alert-status-badge badge-entry-hit";
                    document.getElementById(`status-text-${coin}`).innerText = "LOCKED 🔒";
                    document.getElementById(`box-entry-${coin}`).classList.add('level-hit-highlight');
                    
                    playAlertSound('entry');
                    if(window.Telegram && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        function monitorActiveTradeState(coin, price) {
            const config = coinData[coin];
            document.getElementById(`info-${coin}`).innerHTML = `<i class="fas fa-lock" style="color: #ff3d00;"></i> Allocation Locked. Trailing limits tracking active...`;

            const isTargetHit = config.direction === 'LONG' ? (price >= config.t1Val) : (price <= config.t1Val);
            const isSLHit = config.direction === 'LONG' ? (price <= config.slVal) : (price >= config.slVal);

            if (isTargetHit || isSLHit) {
                // Prevent microsecond overlap triggers by instantly locking execution flag
                config.currentTrackState = 'terminated'; 
                
                const card = document.getElementById(`card-${coin}`);
                card.className = "signal-card " + (isTargetHit ? "card-target-hit" : "card-sl-hit");
                
                const badge = document.getElementById(`alert-badge-${coin}`);
                badge.innerText = isTargetHit ? "TARGET HIT 🎉" : "SL HIT ❌";
                badge.className = "alert-status-badge " + (isTargetHit ? "badge-target-hit" : "badge-sl-hit");
                
                document.getElementById(isTargetHit ? `box-t1-${coin}` : `box-sl-${coin}`).classList.add('level-hit-highlight');
                
                playAlertSound(isTargetHit ? 'target' : 'error');
                if(window.Telegram && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred(isTargetHit ? 'success' : 'error');
                }

                // Smoothly remove completed card after a 4-second delay to give user time to review performance metrics
                setTimeout(() => {
                    card.style.opacity = '0';
                    card.style.transition = 'all 0.5s ease';
                    setTimeout(() => {
                        card.remove();
                        activeCoins.delete(coin);
                        delete coinData[coin];
                        updateSlotUIHeader();
                    }, 500);
                }, 4000);
            }
        }

        function updateSlotUIHeader() {
            document.getElementById('active-slot-counter').innerText = `Slots: ${activeCoins.size} / ${maxSlots}`;
        }

        function copyValue(id) {
            const val = document.getElementById(id.replace('_', '-')).innerText;
            if (val !== '--' && val !== 'Loading...') {
                navigator.clipboard.writeText(val);
                const toast = document.getElementById('toast');
                toast.innerText = `Copied Target Value: ${val}`;
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
                if(window.Telegram && tg.HapticFeedback) tg.HapticFeedback.impact('heavy');
            }
        }
    </script>
</body>
</html>
