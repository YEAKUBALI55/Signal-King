<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>My Chat App</title>
    <!-- Firebase SDK লোড করা হচ্ছে -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // আপনার Firebase কনফিগারেশন এখানে বসান
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // মেসেজ পাঠানো
        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            if (input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            }
        };

        // রিয়েল-টাইমে মেসেজ দেখা
        const q = query(collection(db, "messages"), orderBy("createdAt"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('chat-box');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const msgDiv = document.createElement('div');
                msgDiv.innerText = doc.data().text;
                container.appendChild(msgDiv);
            });
        });
    </script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        #chat-box { width: 300px; height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div>
        <div id="chat-box"></div>
        <input type="text" id="msg-input" placeholder="লিখুন...">
        <button id="send-btn">পাঠান</button>
    </div>
</body>
</html>
