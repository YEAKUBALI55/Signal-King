<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murshidabad Official News</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    
    body {
        background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    .spacer { height: 20px; }

    .news-container { width: 100%; max-width: 600px; margin-top: 10px; }

    .news-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 25px;
        border-radius: 20px;
        margin-bottom: 25px;
        box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
    }

    h2 { font-size: 20px; margin-bottom: 12px; color: #fff; line-height: 1.4; border-left: 4px solid #4ecca3; padding-left: 10px; }
    p { font-size: 16px; color: #ddd; line-height: 1.6; margin-bottom: 15px; }

    /* Meta section styles */
    .meta-container {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 12px;
        color: #4ecca3;
        font-weight: bold;
    }
    
    .meta-container a {
        color: #4ecca3;
        text-decoration: none;
        border-bottom: 1px solid #4ecca3;
    }
</style>
</head>
<body>

    <div class="spacer"></div>

    <div class="news-container" id="news-container"></div>

<script>
    const newsData = [
        { title: "Breaking: Development in Murshidabad", desc: "According to the latest government announcement, major changes are coming to the education and health systems of Murshidabad district." },
        { title: "Berhampore Book Fair Conclusion", desc: "The Berhampore District Book Fair concluded successfully with a massive turnout of visitors." },
        { title: "New Administrative Building", desc: "A new administrative building has been inaugurated today to facilitate the work of the people of Murshidabad district." }
    ];

    const container = document.getElementById("news-container");
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const sourceLink = "https://www.wb.gov.in"; // আপনার সোর্স লিংক এখানে দিন

    newsData.forEach(item => {
        container.innerHTML += `
            <div class="news-card">
                <div class="meta-container">
                    <span>${dateStr} | ${timeStr}</span>
                    <a href="${sourceLink}" target="_blank">Source</a>
                </div>
                <h2>${item.title}</h2>
                <p>${item.desc}</p>
            </div>
        `;
    });
</script>

</body>
</html>
