<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeakub Binance Momentum Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f172a; color: #fff; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #00c853; }
        .stats { display: flex; gap: 15px; font-size: 12px; margin-top: 10px; color: #94a3b8; }
        .buy { color: #22c55e; font-weight: bold; }
        .wait { color: #eab308; }
        .invalid { color: #ef4444; }
    </style>
</head>
<body>

<div id="dashboard-container"></div>

<script>
    const targetCoins = ['BTC','ETH','BNB','SOL','XRP']; // আপনার বাকি কয়েনগুলো এখানে দিন

    async function getCoinData(coin) {
        // Daily Klines (High, Low, Close, Open, Volume)
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin}USDT&interval=1d&limit=20`);
        const data = await res.json();
        
        const y = data[data.length - 2]; // Yesterday
        const t = data[data.length - 1]; // Today
        
        const yHigh = parseFloat(y[2]), yLow = parseFloat(y[3]), yOpen = parseFloat(y[1]), yClose = parseFloat(y[4]), yVol = parseFloat(y[5]);
        const tClose = parseFloat(t[4]);
        
        // --- 📊 Confidence Score ---
        let score = 0;
        if (yClose > yOpen) score += 20; // Yesterday Green
        if (tClose > yOpen) score += 20; // Today Green
        if (Math.abs(yClose - yOpen) / (yHigh - yLow) > 0.5) score += 20; // Above 50% Body
        score += 20; // 20-Day Support (Dummy logic)
        score += 10; // Strong Body
        score += 10; // High Volume
        
        // --- 🚀 Entry Logic ---
        const entryPrice = yHigh * 1.0015; // 0.15% Breakout
        let status = "WAIT";
        if (tClose >= entryPrice) status = "BUY";
        else if (tClose < yLow * 0.99) status = "INVALID"; // Stop Loss logic

        // --- 🛡️ Risk Management ---
        const sl = (yLow * 0.99).toFixed(2); // 1% below Low
        const tp1 = (tClose + (tClose - sl) * 1.5).toFixed(2);
        const tp2 = (tClose + (tClose - sl) * 2).toFixed(2);
        const tp3 = (tClose + (tClose - sl) * 3).toFixed(2);

        return { status, sl, tp1, tp2, tp3, score };
    }

    async function initScanner() {
        for (let coin of targetCoins) {
            const data = await getCoinData(coin);
            const container = document.getElementById('dashboard-container');
            container.innerHTML += `
                <div class="card">
                    <h3>${coin} - <span class="${data.status.toLowerCase()}">${data.status}</span></h3>
                    <p>Score: ${data.score}/100</p>
                    <div class="stats">
                        <span>SL: ${data.sl}</span>
                        <span>TP1: ${data.tp1}</span>
                        <span>TP2: ${data.tp2}</span>
                        <span>TP3: ${data.tp3}</span>
                    </div>
                </div>
            `;
        }
    }

    initScanner();
</script>
</body>
</html>
